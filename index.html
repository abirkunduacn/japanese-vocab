<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Japanese Business Vocabulary</title>
<style>
  :root{
    --red:#C00000; --green:#375623; --grey:#595959;
    --blue-light:#EBF3FB; --navy:#1F4E79; --accent:#2E75B6;
    --bg:#f4f7fb; --card:#fff; --border:#d0dce9;
    --radius:10px; --shadow:0 2px 8px rgba(0,0,0,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:#222;min-height:100vh}

  /* ── Header ── */
  header{background:var(--navy);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:1.35rem;font-weight:700;letter-spacing:.5px}
  header p{font-size:.82rem;opacity:.8;margin-top:2px}
  .badge{background:#fff2;border:1px solid #fff4;border-radius:20px;padding:3px 12px;font-size:.78rem;white-space:nowrap}

  /* ── Controls ── */
  .controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .search-wrap{position:relative;flex:1;min-width:180px}
  .search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;outline:none;transition:border .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.45;font-size:1rem}
  .tier-filter{display:flex;gap:6px;flex-wrap:wrap}
  .tier-btn{border:none;border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;cursor:pointer;opacity:.55;transition:opacity .15s,transform .1s}
  .tier-btn.active{opacity:1;transform:scale(1.05)}
  .tier-btn.all{background:#e8edf2;color:#333}
  .tier-btn.red{background:#fde9e9;color:var(--red)}
  .tier-btn.green{background:#e8f4e8;color:var(--green)}
  .tier-btn.grey{background:#eee;color:var(--grey)}
  .count-label{font-size:.78rem;color:#888;white-space:nowrap;align-self:center}

  /* ── Tabs ── */
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:#fff;padding:0 20px}
  .tab{padding:11px 20px;cursor:pointer;font-size:.88rem;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;white-space:nowrap}
  .tab.active{color:var(--navy);border-bottom-color:var(--navy)}
  .tab:hover:not(.active){color:var(--accent)}
  .tab-count{display:inline-block;background:#e8edf2;border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:5px;font-weight:700}

  /* ── Grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:20px}

  /* ── Card ── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s,transform .1s;cursor:pointer}
  .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.13);transform:translateY(-1px)}
  .card-head{padding:14px 16px 10px;border-bottom:1px solid #f0f4f9}
  .card-word{font-size:1.4rem;font-weight:800;color:#1a1a1a;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .freq-badge{font-size:.72rem;font-weight:700;border-radius:12px;padding:2px 9px;white-space:nowrap}
  .freq-red  {background:#fde9e9;color:var(--red);border:1px solid #f5b8b8}
  .freq-green{background:#e8f4e8;color:var(--green);border:1px solid #b6d9b6}
  .freq-grey {background:#eee;color:var(--grey);border:1px solid #ccc}
  .card-reading{font-size:.8rem;color:#667;margin-top:4px}
  .card-body{padding:10px 16px 14px}
  .card-meaning{font-size:.88rem;color:#333;line-height:1.5}
  .card-details{margin-top:10px;display:none;border-top:1px dashed #e0eaf4;padding-top:10px}
  .card.open .card-details{display:block}
  .detail-row{margin-top:7px}
  .detail-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:2px}
  .detail-jp{font-size:.88rem;color:#1a1a1a;line-height:1.6}
  .detail-furigana{font-size:.78rem;color:#556;margin-top:2px;line-height:1.6}
  .detail-en{font-size:.78rem;color:#555;font-style:italic;margin-top:2px}
  .expand-hint{font-size:.7rem;color:#aaa;text-align:right;padding:2px 16px 8px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
  .expand-arrow{transition:transform .2s}
  .card.open .expand-arrow{transform:rotate(180deg)}

  /* ── Empty state ── */
  .empty{text-align:center;padding:60px 20px;color:#aaa}
  .empty .icon{font-size:3rem;margin-bottom:10px}

  /* ── Footer ── */
  footer{text-align:center;padding:24px;font-size:.75rem;color:#aaa;border-top:1px solid var(--border);margin-top:20px}

  @media(max-width:500px){
    .tab{padding:10px 12px;font-size:.8rem}
    .grid{grid-template-columns:1fr;padding:12px}
    header h1{font-size:1.1rem}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🇯🇵 Japanese Business Vocabulary</h1>
    <p>Business Japanese for the workplace</p>
  </div>
  <span class="badge" id="last-updated"></span>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search word, meaning, reading…" oninput="renderCurrent()"/>
  </div>
  <div class="tier-filter">
    <button class="tier-btn all active" onclick="setTier('all',this)">All</button>
    <button class="tier-btn red"  onclick="setTier('red',this)">🔴 High (8+)</button>
    <button class="tier-btn green" onclick="setTier('green',this)">🟢 Mid (4–7)</button>
    <button class="tier-btn grey" onclick="setTier('grey',this)">⚪ Low (1–3)</button>
  </div>
  <span class="count-label" id="count-label"></span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('business',this)">
    業務単語 <span class="tab-count" id="tc-business">0</span>
  </div>
  <div class="tab" onclick="switchTab('katakana',this)">
    カタカナ <span class="tab-count" id="tc-katakana">0</span>
  </div>
  <div class="tab" onclick="switchTab('phrases',this)">
    フレーズ <span class="tab-count" id="tc-phrases">0</span>
  </div>
</div>

<div class="grid" id="grid"></div>
<footer id="footer"></footer>

<script>
const RAW = {"business": [{"word": "連携", "reading": "れんけい (renkei)", "meaning": "Collaboration/Coordination — working together across teams", "example_jp": "グローバルと連携して進める。", "example_furigana": "グローバルと連携（れんけい）して進（すす）める。", "example_en": "Proceed in collaboration with the global team.", "count": 34}, {"word": "報告", "reading": "ほうこく (hōkoku)", "meaning": "Report/Reporting — presenting information formally", "example_jp": "毎週進捗を報告してください。", "example_furigana": "毎週（まいしゅう）進捗（しんちょく）を報告（ほうこく）してください。", "example_en": "Please report the progress every week.", "count": 30}, {"word": "成果物", "reading": "せいかぶつ (seikabutsu)", "meaning": "Deliverable — a tangible output or result produced from a project or task", "example_jp": "成果物はPowerPoint資料で提出します。", "example_furigana": "成果物（せいかぶつ）はPowerPoint資料（しりょう）で提出（ていしゅつ）します。", "example_en": "The deliverable will be submitted as a PowerPoint document.", "count": 30}, {"word": "承認", "reading": "しょうにん（shounin）", "meaning": "approval — formal sign-off or authorization", "example_jp": "この書類の承認をお願いします。", "example_furigana": "この（この）しょるい（書類）の（の）しょうにん（承認）を（を）おねがい（お願い）します（します）。", "example_en": "Please approve this document.", "count": 27}, {"word": "確認", "reading": "かくにん (kakunin)", "meaning": "Confirmation/Check — verifying or making sure of something", "example_jp": "スケジュールを確認します。", "example_furigana": "スケジュールを確認（かくにん）します。", "example_en": "I will confirm the schedule.", "count": 18}, {"word": "方針", "reading": "ほうしん (hōshin)", "meaning": "Policy/Direction — the guiding approach or strategy", "example_jp": "全体の方針を先に決める。", "example_furigana": "全体（ぜんたい）の方針（ほうしん）を先（さき）に決（き）める。", "example_en": "Decide the overall direction first.", "count": 15}, {"word": "進捗", "reading": "しんちょく (shinchoku)", "meaning": "Progress — the current state of advancement of work", "example_jp": "各チームの進捗を確認する。", "example_furigana": "各（かく）チームの進捗（しんちょく）を確認（かくにん）する。", "example_en": "Check the progress of each team.", "count": 13}, {"word": "体制", "reading": "たいせい (taisei)", "meaning": "Structure/System/Setup — organizational arrangement", "example_jp": "新しい組織体制を決める。", "example_furigana": "新（あたら）しい組織（そしき）体制（たいせい）を決（き）める。", "example_en": "Decide the new organizational structure.", "count": 11}, {"word": "移行", "reading": "いこう (ikou)", "meaning": "Migration / Transition — shifting from one system or operational state to another", "example_jp": "データ移行のリハーサルを来月実施します。", "example_furigana": "データ移行(いこう)のリハーサルを来月(らいげつ)実施(じっし)します。", "example_en": "We will conduct the data migration rehearsal next month.", "count": 11}, {"word": "完了", "reading": "かんりょう (Kanryō)", "meaning": "Completion; finished — the state of having fully finished a task, phase, or deliverable", "example_jp": "タスクを今週中に完了させる予定です。", "example_furigana": "タスクを今週中（こんしゅうちゅう）に完了（かんりょう）させる予定（よてい）です。", "example_en": "We plan to complete the tasks within this week.", "count": 10}, {"word": "新規", "reading": "しんき (Shinki)", "meaning": "New; newly created or issued — describes something created from scratch rather than modified", "example_jp": "新規のURLを発行する必要があります。", "example_furigana": "新規（しんき）のURLを発行（はっこう）する必要（ひつよう）があります。", "example_en": "A new URL needs to be issued.", "count": 10}, {"word": "導入", "reading": "どうにゅう (dōnyū)", "meaning": "introduction/implementation — bringing in a new system, tool, or process", "example_jp": "4月から新しいフェーズの導入が始まりました。", "example_furigana": "4がつからあたらしいフェーズのどうにゅうがはじまりました。", "example_en": "The implementation of the new phase began in April.", "count": 10}, {"word": "署名", "reading": "しょめい (shomei)", "meaning": "Signature — a person's signed name, including electronic (digital) signatures", "example_jp": "仕様書には全ての承認者が電子署名をする必要があります。", "example_furigana": "仕様書(しようしょ)には全(すべ)ての承認者(しょうにんしゃ)が電子署名(でんししょめい)をする必要(ひつよう)があります。", "example_en": "All approvers need to electronically sign the specification document.", "count": 10}, {"word": "顧問", "reading": "こもん (Komon)", "meaning": "Advisor; consultant — an expert who provides guidance and recommendations to a project or organization", "example_jp": "顧問チームだけではできないことが多いので、ワーキンググループと連携して進めましょう。", "example_furigana": "顧問（こもん）チームだけではできないことが多（おお）いので、ワーキンググループと連携（れんけい）して進（すす）めましょう。", "example_en": "There are many things the advisory team alone cannot do, so let's proceed in collaboration with the working group.", "count": 9}, {"word": "認識", "reading": "にんしき (ninshiki)", "meaning": "Understanding/Recognition — shared awareness or alignment", "example_jp": "チームで認識を合わせましょう。", "example_furigana": "チームで認識（にんしき）を合（あ）わせましょう。", "example_en": "Let's align our understanding as a team.", "count": 7}, {"word": "全体", "reading": "ぜんたい (zentai)", "meaning": "Overall/Whole — referring to the entire project or group", "example_jp": "全体として進捗を報告する。", "example_furigana": "全体（ぜんたい）として進捗（しんちょく）を報告（ほうこく）する。", "example_en": "Report the progress as a whole.", "count": 7}, {"word": "判断", "reading": "はんだん (handan)", "meaning": "Judgment/Decision — making a call on a situation", "example_jp": "この状況を判断する必要がある。", "example_furigana": "この状況（じょうきょう）を判断（はんだん）する必要（ひつよう）がある。", "example_en": "It is necessary to make a judgment on this situation.", "count": 7}, {"word": "工数", "reading": "こうすう (kousuu)", "meaning": "Man-hours / effort estimate — the amount of labor (in person-hours or person-days) required for a task", "example_jp": "この作業の工数は約10人日と見積もっています。", "example_furigana": "この作業（さぎょう）の工数（こうすう）は約（やく）10人日（にんにち）と見積（みつも）もっています。", "example_en": "We estimate this task requires approximately 10 person-days of effort.", "count": 7}, {"word": "策定", "reading": "さくてい (sakutei)", "meaning": "Formulation / Drafting — creating a plan, policy, or standard", "example_jp": "4月中にOver-all Test Planを策定します。", "example_furigana": "4月(しがつ)中(ちゅう)にOver-all Test Planを策定(さくてい)します。", "example_en": "We will formulate the Overall Test Plan within April.", "count": 7}, {"word": "調整", "reading": "ちょうせい (chōsei)", "meaning": "Adjustment/Coordination — tuning schedules, plans, or relationships", "example_jp": "日程を調整しています。", "example_furigana": "日程（にってい）を調整（ちょうせい）しています。", "example_en": "I am adjusting the schedule.", "count": 6}, {"word": "対応", "reading": "たいおう (taiō)", "meaning": "Response/Handling — dealing with an issue or request", "example_jp": "この問題に対応します。", "example_furigana": "この問題（もんだい）に対応（たいおう）します。", "example_en": "I will handle this issue.", "count": 6}, {"word": "個別", "reading": "こべつ (kobetsu)", "meaning": "Individual/Separate — one-on-one or team-specific", "example_jp": "個別に確認させてください。", "example_furigana": "個別（こべつ）に確認（かくにん）させてください。", "example_en": "Please let me check individually.", "count": 6}, {"word": "よろしくお願いいたします", "reading": "よろしくおねがいいたします (yoroshiku onegai itashimasu)", "meaning": "Thank you / Please — formal closing phrase used when making requests or starting/ending meetings", "example_jp": "引き続きよろしくお願いいたします。", "example_furigana": "引（ひ）き続（つづ）きよろしくお願（ねが）いいたします。", "example_en": "Thank you for your continued support.", "count": 6}, {"word": "依頼", "reading": "いらい (irai)", "meaning": "Request — formally asking someone to do something", "example_jp": "この後すぐ依頼させていただきます。", "example_furigana": "この後（あと）すぐ依頼（いらい）させていただきます。", "example_en": "I will make a request right after this.", "count": 6}, {"word": "先行", "reading": "せんこう (Senkō)", "meaning": "Advance; going first — starting or proceeding ahead of others or ahead of schedule", "example_jp": "先行して着手することで、スケジュールを守れます。", "example_furigana": "先行（せんこう）して着手（ちゃくしゅ）することで、スケジュールを守（まも）れます。", "example_en": "By getting started ahead of time, we can keep to the schedule.", "count": 6}, {"word": "見通し", "reading": "みとおし（mitooshi）", "meaning": "outlook / prospect — a forward-looking estimate or forecast", "example_jp": "クローズの見通しがまだ立っていません。", "example_furigana": "クローズ（クローズ）の（の）みとおし（見通し）が（が）まだ（まだ）たって（立って）いません（いません）。", "example_en": "The outlook for closure is still unclear.", "count": 6}, {"word": "現状", "reading": "げんじょう（genjou）", "meaning": "current state / status quo — the existing situation as it stands", "example_jp": "現状を維持したいという意見があります。", "example_furigana": "げんじょう（現状）を（を）いじ（維持） ding on the policy direction is planned for end of April.", "count": 3}, {"word": "合意形成", "reading": "ごういけいせい（gouikeisei）", "meaning": "consensus building — the process of gaining agreement among stakeholders", "example_jp": "合意形成のもとでスピルオーバーを管理する。", "example_furigana": "ごうい（合意）けいせい（形成）の（の）もと（もと）で（で）スピルオーバー（スピルオーバー）を（を）かんり（管理）する（する）。", "example_en": "Spillover items are managed based on consensus building.", "count": 3}, {"word": "了解しました", "reading": "りょうかいしました（ryoukai shimashita）", "meaning": "Understood / Got it — standard acknowledgment in meetings, slightly less formal than 承知いたしました", "example_jp": "確認や指示を受けた時の返答", "example_furigana": "了解しました。確認して対応します。", "example_en": "Understood. I will check and take action.", "count": 3}, {"word": "凍結", "reading": "とうけつ (tōketsu)", "meaning": "freeze — stopping or locking something (e.g. license freeze, feature freeze)", "example_jp": "ライセンスの使用凍結になります。", "example_furigana": "ライセンスのしようとうけつになります。", "example_en": "The use of licenses will be frozen.", "count": 3}, {"word": "原則", "reading": "げんそく (gensoku)", "meaning": "principle/rule — a fundamental rule or policy that governs behavior", "example_jp": "原則として、設計書が完成してから開発を始めます。", "example_furigana": "げんそくとして、せっけいしょがかんせいしてからかいはつをはじめます。", "example_en": "As a rule, development starts after the design document is complete.", "count": 3}, {"word": "受け入れ", "reading": "うけいれ (ukere)", "meaning": "acceptance — receiving or accepting; also used for User Acceptance Testing (UAT) in IT", "example_jp": "受け入れテストを実施します。", "example_furigana": "うけいれテストをじっしします。", "example_en": "We will conduct acceptance testing.", "count": 3}, {"word": "概要", "reading": "がいよう (gaiyō)", "meaning": "overview/summary — a high-level description of something", "example_jp": "プロジェクトの概要を簡単に共有させてください。", "example_furigana": "プロジェクトのがいようをかんたんにきょうゆうさせてください。", "example_en": "Please allow me to briefly share an overview of the project.", "count": 3}, {"word": "要件定義", "reading": "ようけんていぎ (yōken teigi)", "meaning": "requirements rigana": "プロジェクトの遂行(すいこう)に向(む)けて体制(たいせい)を強化(きょうか)します。", "example_en": "We will strengthen the structure toward the execution of the project.", "count": 3}, {"word": "見える化", "reading": "みえるか (mieru ka)", "meaning": "Visualization — making progress/tasks transparent and visible", "example_jp": "タスクの見える化をお願いします。", "example_furigana": "タスクの見（み）える化（か）をお願（ねが）いします。", "example_en": "Please make the tasks visible/transparent.", "count": 2}, {"word": "承知いたしました", "reading": "しょうちいたしました (shouchi itashimashita)", "meaning": "I understand / Understood — formal acknowledgment of instructions or information", "example_jp": "承知いたしました。すぐに対応します。", "example_furigana": "承知（しょうち）いたしました。すぐに対応（たいおう）します。", "example_en": "Understood. I will respond immediately.", "count": 2}, {"word": "本稼働", "reading": "ほんかどう (hon-kadou)", "meaning": "Production launch / Go-live — the official start of full system operation", "example_jp": "本稼働に向けて準備を進めています。", "example_furigana": "本稼働（ほんかどう）に向（む）けて準備（じゅんび）を進（すす）めています。", "example_en": "We are preparing toward the production launch.", "count": 2}, {"word": "推奨事項", "reading": "すいしょうじこう (suishou jikou)", "meaning": "Recommendations — suggested actions or best practices", "example_jp": "レポートに推奨事項を記載します。", "example_furigana": "レポートに推奨事項（すいしょうじこう）を記載（きさい）します。", "example_en": "We will include recommendations in the report.", "count": 2}, {"word": "報告会", "reading": "ほうこくかい (houkokukai)", "meaning": "Debriefing / Report meeting — a formal meeting to present findings and results", "example_jp": "来週の報告会で発見事項を共有します。", "example_furigana": "来週（らいしゅう）の報告会（ほうこくかい）で発見事項（はっけんじこう）を共有（きょうゆう）します。", "example_en": "We will share the findings at next week's debriefing.", "count": 2}, {"word": "権限設計", "reading": "けんげんせっけい (kengen sekkei)", "meaning": "Authorization design — the design of user access rights and permission structures", "example_jp": "フィオリの権限設計を見直す必要があります。", "example_furigana": "フィオリの権限設計（けんげんせっけい）を見直（みなお）す必要（ひつよう）があります。", "example_en": "We need to review the Fiori authorization design.", "count": 2}, {"word": "潜在的", "reading": "せんざいてき (senzaiteki)", "meaning": "Potential / Latent — describing hidden or underlying risks and challenges", "example_jp": "潜在的なリスクを洗い出します。", "example_furigana": "潜在的（せんざいてき）なリスクを洗（あら）い出（だ）します。", "example_en": "We will identify potential risks.", "count": 2}, {"word": "変化点対応", "reading": "へんかてんたいおう (henka ten taiou)", "meaning": "Change point response — addressing and managing identified points of change in a project", "example_jp": "変化点対応のリストを作成してチームで共有しました。", "example_furigana": "変化点対応（へんかてんたいおう）のリストを作成（さくせい）してチームで共有（きょうゆう）しました。", "example_en": "We created a list of change points and shared it with the team.", "count": 2}, {"word": "体制図", "reading": "たいせいず (taisei zu)", "meaning": "Organization chart / structure diagram — a diagram showing team roles and reporting relationships", "example_jp": "プロジェクトの体制図を作成して関係者に共有しました。", "example_furigana": "プロジェクトの体制図（たいせいず）を作成（さくせい）して関係者（かんけいしゃ）に共有（きょうゆう）しました。", "example_en": "We created the project organization chart and shared it with stakeholders.", "count": 2}, {"word": "増員", "reading": "ぞういん (zouin)", "meaning": "Staff increase / headcount expansion — adding more personnel to a team or project", "example_jp": "繁忙期に備えて増員を検討しています。", "example_furigana": "繁忙期（はんぼうき）に備（そな）えて増員（ぞういん）を検討（けんとう）しています。", "example_en": "We are considering increasing headcount in preparation for the busy season.", "count": 2}, {"word": "乖離", "reading": "かいり (Kairi)", "meaning": "Gap; discrepancy; divergence — the difference between a standard or target and the actual current state", "example_jp": "イグジットクライテリアに対して乖離があるところは黄色で示します。", "example_furigana": "イグジットクライテリアに対（たい）して乖離（かいり）があるところは黄色（きいろ）で示（しめ）します。", "example_en": "Areas with a gap against the exit criteria are shown in yellow.", "count": 2}, {"word": "周知", "reading": "しゅうち (Shūchi)", "meaning": "General awareness; notifying everyone — communicating information broadly to all relevant parties", "example_jp": "この内容を全体に周知させていただきます。", "example_furigana": "この内容（ないよう）を全体（ぜんたい）に周知（しゅうち）させていただきます。", "example_en": "We will inform everyone of this content.", "count": 2}, {"word": "予定通り", "reading": "よていどおり (Yotei dōri)", "meaning": "As planned; according to schedule — indicating that progress is on track with the original plan", "example_jp": "作業は予定通り3月末までに完了させます。", "example_furigana": "作業（さぎょう）は予定通（よていどお）り3月末（さんがつまつ）までに完了（かんりょう）させます。", "example_en": "The work will be completed by end of March as planned.", "count": 2}, {"word": "作法", "reading": "さほう (Sahō)", "meaning": "Proper procedure; established etiquette — the correct or expected way to perform a process", "example_jp": "作法通りに手続きを進めてください。", "example_furigana": "作法（さほう）通（どお）りに手続（てつづ）きを進（すす）めてください。", "example_en": "Please proceed with the procedure in the proper manner.", "count": 2}, {"word": "運用", "reading": "うんよう (Un'yō)", "meaning": "Operation; management — the ongoing use and management of a system or process in practice", "example_jp": "今後の運用を考えて設計してください。", "example_furigana": "今後（こんご）の運用（うんよう）を考（かんが）えて設計（せっけい）してください。", "example_en": "Please design it with future operations in mind.", "count": 2}, {"word": "発行", "reading": "はっこう (Hakkō)", "meaning": "Issuance; publication — the official release or issuance of a document, number, or certificate", "example_jp": "取り急ぎURSの発行を進めます。", "example_furigana": "取（と）り急（いそ）ぎURSの発行（はっこう）を進（すす）めます。", "example_en": "We will urgently proceed with the issuance of the URS.", "count": 2}, {"word": "背景", "reading": "はいけい (Haikei)", "meaning": "Background; context — the circumstances or history behind a situation or request", "example_jp": "質問の背景を教えていただけますでしょうか。", "example_furigana": "質問（しつもん）の背景（はいけい）を教（おし）えていただけますでしょうか。", "example_en": "Could you tell me the background behind the question?", "count": 2}, {"word": "着手", "reading": "ちゃくしゅ (Chakushu)", "meaning": "Starting; beginning work — commencing a task or project", "example_jp": "今週からこの作業に着手します。", "example_furigana": "今週（こんしゅう）からこの作業（さぎょう）に着手（ちゃくしゅ）します。", "example_en": "We will begin this work starting this week.", "count": 2}, {"word": "紐付け", "reading": "ひもづけ (Himodzuke)", "meaning": "Linking; association — connecting or tying two items (e.g. documents, IDs) together in a system", "example_jp": "FDSと既存のURSを紐付けてください。", "example_furigana": "FDSと既存（きぞん）のURSを紐付（ひもづ）けてください。", "example_en": "Please link the FDS to the existing URS.", "count": 2}, {"word": "見極め", "reading": "みきわめ（mikiwame）", "meaning": "determination / proper assessment — carefully judging the right course of action", "example_jp": "正確に見極めてからアプローチを取ります。", "example_furigana": "せいかくに（正確に）みきわめて（見極めて）から（から）アプローチ（アプローチ）を（を）とります（取ります）。", "example_en": "We will take an approach after making a careful assessment.", "count": 2}, {"word": "見直し", "reading": "みなおし (minaoshi)", "meaning": "review/reconsideration — looking at something again to revise or check", "example_jp": "ちょっと見直しさせてください。", "example_furigana": "ちょっとみなおしさせてください。", "example_en": "Let me review it for a moment.", "count": 2}, {"word": "差し替え", "reading": "さしかえ (sashikae)", "meaning": "replacement/substitution — swapping out a document, slide, or item with a new version", "example_jp": "この資料を差し替えてください。", "example_furigana": "このしりょうをさしかえてください。", "example_en": "Please replace this document.", "count": 2}, {"word": "確認事項", "reading": "かくにんじこう (kakunin jikō)", "meaning": "items to confirm — a checklist or list of points that need to be verified", "example_jp": "この場で確認事項はありますか？", "example_furigana": "このばでかくにんじこうはありますか？", "example_en": "Are there any items to confirm here?", "count": 2}, {"word": "工程", "reading": "こうてい (kōtei)", "meaning": "process/stage — a step or phase in a workflow or development lifecycle", "example_jp": "FUTは対外的には工程としてはないんです。", "example_furigana": "FUTはたいがいてきにはこうていとしてはないんです。", "example_en": "FUT does not exist as a formal process externally.", "count": 2}, {"word": "テスト実行者", "reading": "テストじっこうしゃ (tesuto jikkōsha)", "meaning": "test executor/tester — the person who performs or runs the test", "example_jp": "テスト実行者は開発メンバーです。", "example_furigana": "テストじっこうしゃはかいはつメンバーです。", "example_en": "The test executor is a development team member.", "count": 2}, {"word": "上流", "reading": "じょうりゅう (jōryū)", "meaning": "upstream — the early phases of a project such as planning and requirements", "example_jp": "上流から下流まで一通りの経験があります。", "example_furigana": "じょうりゅうからかりゅうまでひととおりのけいけんがあります。", "example_en": "I have experience across the full range from upstream to downstream.", "count": 2}, {"word": "本番", "reading": "ほんばん (honban)", "meaning": "production — the live production environment, as opposed to test or development", "example_jp": "本番切り替え前にテストを完了させます。", "example_furigana": "ほんばんきりかえまえにテストをかんりょうさせます。", "example_en": "We will complete testing before the production cutover.", "count": 2}, {"word": "拠点", "reading": "きょてん (kyoten)", "meaning": "site/base — a location or base of operations (e.g. country or office)", "example_jp": "ヨーロッパが最初の導入拠点です。", "example_furigana": "ヨーロッパがさいしょのどうにゅうきょてんです。", "example_en": "Europe is the first implementation site.", "count": 2}, {"word": "先ほど申し上げた通り", "reading": "さきほどもうしあげたとおり (sakihodo mōshiageta tōri)", "meaning": "as I mentioned earlier — formal keigo way of referring back to something you said", "example_jp": "会議の中で前述を参照する場面 (referring back to a prior point in a meeting)", "example_furigana": "先ほど申し上げた通り、設計フェーズが4月から始まりました。", "example_en": "As I mentioned earlier, the design phase started in April.", "count": 2}, {"word": "推進", "reading": "すいしん (suishin)", "meaning": "Promotion / Driving forward — actively advancing an initiative or strategy", "example_jp": "DX推進部が全社のデジタル化を牽引しています。", "example_furigana": "DX推進(すいしん)部(ぶ)が全社(ぜんしゃ)のデジタル化(か)を牽引(けんいん)しています。", "example_en": "The DX Promotion Department is leading the company-wide digitalization.", "count": 2}, {"word": "期日", "reading": "きじつ (kijitsu)", "meaning": "Deadline / Due date — the appointed date by which something must be done", "example_jp": "承認の期日は6月26日に設定されています。", "example_furigana": "承認(しょうにん)の期日(きじつ)は6月(ろくがつ)26日(にちじゅうろくにち)に設定(せってい)されています。", "example_en": "The approval deadline is set for June 26th.", "count": 2}, {"word": "精緻化", "reading": "せいちか (seichika)", "meaning": "Refinement / Making more precise — the process of elaborating and sharpening details", "example_jp": "変化点サマリを4月から5月にかけて精緻化していきます。", "example_furigana": "変化点(へんかてん)サマリを4月(しがつ)から5月(ごがつ)にかけて精緻化(せいちか)していきます。", "example_en": "We will refine the change impact summary from April through May.", "count": 2}, {"word": "意思決定", "reading": "いしけってい (ishi kettei)", "meaning": "Decision-making — the process of making choices or resolving issues", "example_jp": "PMOが課題の意思決定をスピーディーにサポートします。", "example_furigana": "PMOが課題(かだい)の意思決定(いしけってい)をスピーディーにサポートします。", "example_en": "The PMO will speedily support decision-making on issues.", "count": 2}, {"word": "経営企画", "reading": "けいえいきかく (keiei kikaku)", "meaning": "Management planning / Corporate planning — department that oversees business strategy", "example_jp": "経営企画がPMOをリードしてきた実績があります。", "example_furigana": "経営企画(けいえいきかく)がPMOをリードしてきた実績(じっせき)があります。", "example_en": "Management planning has a track record of leading the PMO.", "count": 2}, {"word": "なるほど", "reading": "なるほど (naruhodo)", "meaning": "I see / I understand — natural response when something becomes clear", "example_jp": "なるほど、それが原因ですね。", "example_furigana": "なるほど、それが原因（げんいん）ですね。", "example_en": "I see, that's the cause, isn't it.", "count": 1}, {"word": "窓口", "reading": "まどぐち (madoguchi)", "meaning": "Point of contact / Liaison — the designated person or channel for communication", "example_jp": "担当の窓口は木暮さんです。", "example_furigana": "担当（たんとう）の窓口（まどぐち）は木暮（こぐれ）さんです。", "example_en": "The point of contact in charge is Mr. Kogure.", "count": 1}, {"word": "随時", "reading": "ずいじ (zuiji)", "meaning": "At any time / As needed — whenever necessary or on an ad-hoc basis", "example_jp": "随時ご質問をさせていただくことがあります。", "example_furigana": "随時（ずいじ）ご質問（しつもん）をさせていただくことがあります。", "example_en": "I may ask questions from time to time as needed.", "count": 1}, {"word": "差分要件", "reading": "さぶんようけん (sabun youken)", "meaning": "Differential requirements — unique or additional requirements specific to a region/scope", "example_jp": "日本固有の差分要件を確認します。", "example_furigana": "日本（にほん）固有（こゆう）の差分要件（さぶんようけん）を確認（かくにん）します。", "example_en": "We will confirm the Japan-specific differential requirements.", "count": 1}, {"word": "一気通貫", "reading": "いっきつうかん (ikki tsuukan)", "meaning": "End-to-end / Seamless — describes a consistent, unbroken process from start to finish", "example_jp": "一気通貫でサービスをサポートしています。", "example_furigana": "一気通貫（いっきつうかん）でサービスをサポートしています。", "example_en": "We are providing end-to-end service support.", "count": 1}, {"word": "収束", "reading": "しゅうそく (Shūsoku)", "meaning": "Convergence; resolution — bringing scattered issues or tasks to a conclusion or settled state", "example_jp": "スピルオーバーの収束に向けた活動を進めます。", "example_furigana": "スピルオーバーの収束（しゅうそく）に向（む）けた活動（かつどう）を進（すす）めます。", "example_en": "We will proceed with activities aimed at resolving the spillovers.", "count": 1}, {"word": "安定稼働", "reading": "あんていかどう (Antei kadō)", "meaning": "Stable operation — smooth, reliable operation of a system after go-live; a target state post-launch", "example_jp": "本番稼働後の安定稼働を目指して準備を進めます。", "example_furigana": "本番稼働後（ほんばんかどうご）の安定稼働（あんていかどう）を目指（めざ）して準備（じゅんび）を進（すす）めます。", "example_en": "We will prepare with the goal of achieving stable operation after going live.", "count": 1}, {"word": "本格化", "reading": "ほんかくか (Honkakuka)", "meaning": "Getting into full swing; becoming full-scale — transitioning from preparation to full-scale operations", "example_jp": "4月から決算業務が本格化するため、今月中に準備を終わらせます。", "example_furigana": "4月（しがつ）から決算業務（けっさんぎょうむ）が本格化（ほんかくか）するため、今月中（こんげつちゅう）に準備（じゅんび）を終（お）わらせます。", "example_en": "Since full-scale financial closing operations begin in April, we will finish preparations this month.", "count": 1}, {"word": "総力戦", "reading": "そうりょくせん (Sōryokusen)", "meaning": "All-out effort; mobilizing all resources — working with every available resource at maximum capacity", "example_jp": "ワーキンググループも総力戦でスピルオーバーを解決しましょう。", "example_furigana": "ワーキンググループも総力戦（そうりょくせん）でスピルオーバーを解決（かいけつ）しましょう。", "example_en": "Let's resolve the spillovers with an all-out effort from the working group as well.", "count": 1}, {"word": "遊休奨励日", "reading": "ゆうきゅうしょうれいび (Yūkyū shōreibi)", "meaning": "Company-encouraged discretionary holiday — a day when the company encourages employees to take voluntary time off", "example_jp": "本日は遊休奨励日のため、参加者が少ない見込みです。", "example_furigana": "本日（ほんじつ）は遊休奨励日（ゆうきゅうしょうれいび）のため、参加者（さんかしゃ）が少（すく）ない見込（みこ）みです。", "example_en": "As today is a company-encouraged holiday, we expect fewer participants.", "count": 1}, {"word": "質疑応答", "reading": "しつぎおうとう (Shitsugi ōtō)", "meaning": "Q&A session; question-and-answer — a dedicated segment for participants to ask and receive answers", "example_jp": "説明が終わり次第、質疑応答の時間を設けます。", "example_furigana": "説明（せつめい）が終（お）わり次第（しだい）、質疑応答（しつぎおうとう）の時間（じかん）を設（もう）けます。", "example_en": "Once the explanation is finished, we will have a Q&A session.", "count": 1}, {"word": "部屋割り", "reading": "へやわり (Heya-wari)", "meaning": "Room assignment; room allocation — the plan specifying which room or space each team or session uses", "example_jp": "事前に部屋割りをメールで展開しましたのでご確認ください。", "example_furigana": "事前（じぜん）に部屋割（へやわ）りをメールで展開（てんかい）しましたのでご確認（かくにん）ください。", "example_en": "We have shared the room assignments in advance by email, so please check them.", "count": 1}, {"word": "退室", "reading": "たいしつ (Taishitsu)", "meaning": "Leaving the room; exiting — the act of departing from a conference room or meeting space", "example_jp": "退室される際は、お忘れ物がないようにご注意ください。", "example_furigana": "退室（たいしつ）される際（さい）は、お忘（わす）れ物（もの）がないようにご注意（ちゅうい）ください。", "example_en": "When leaving the room, please make sure you have not left anything behind.", "count": 1}, {"word": "弊害", "reading": "へいがい (Heigai)", "meaning": "Drawback; harmful side effect — an unintended negative consequence of an approach or action", "example_jp": "一つずつ分けると弊害が生じる場合があります。", "example_furigana": "一（ひと）つずつ分（わ）けると弊害（へいがい）が生（しょう）じる場合（ばあい）があります。", "example_en": "Separating them one by one may cause drawbacks.", "count": 1}, {"word": "粛々と", "reading": "しゅくしゅくと (Shukushuku to)", "meaning": "Solemnly; quietly and dutifully — proceeding without fuss, following established rules faithfully", "example_jp": "ルールに従って粛々と進めます。", "example_furigana": "ルールに従（したが）って粛々（しゅくしゅく）と進（すす）めます。", "example_en": "We will proceed dutifully in accordance with the rules.", "count": 1}, {"word": "簡略化", "reading": "かんりゃくか (Kanryakuka)", "meaning": "Simplification; streamlining — reducing complexity in a process or document", "example_jp": "テスト手順を簡略化することを検討しています。", "example_furigana": "テスト手順（てじゅん）を簡略化（かんりゃくか）することを検討（けんとう）しています。", "example_en": "We are considering simplifying the test procedures.", "count": 1}, {"word": "補填", "reading": "ほてん（hoten）", "meaning": "filling a vacancy / making up a shortfall — replacing a departing member or covering a resource gap", "example_jp": "既存メンバーが戻らない場合は補填が必要です。", "example_furigana": "きぞん（既存）メンバー（メンバー）が（が）もどらない（戻らない）ばあい（場合）は（は）ほてん（補填）が（が）ひつよう（必要）です（です）。", "example_en": "If an existing member does not return, we will need to fill the vacancy.", "count": 1}, {"word": "追記", "reading": "ついき (tsuiki)", "meaning": "additional note — to append or add supplementary information", "example_jp": "必要だったら追記します。", "example_furigana": "ひつようだったらついきします。", "example_en": "I will add it if necessary.", "count": 1}, {"word": "注釈", "reading": "ちゅうしゃく (chūshaku)", "meaning": "annotation/footnote — explanatory note added to a document or diagram", "example_jp": "注釈のところにコメントを追記しました。", "example_furigana": "ちゅうしゃくのところにコメントをついきしました。", "example_en": "I added a comment in the annotation section.", "count": 1}, {"word": "事実確認", "reading": "じじつかくにん (jijitsu kakunin)", "meaning": "fact-checking/verification — confirming whether something is true or correct", "example_jp": "ちょっと事実確認してから報告します。", "example_furigana": "ちょっとじじつかくにんしてからほうこくします。", "example_en": "I will verify the facts before reporting.", "count": 1}, {"word": "ご認識ください", "reading": "ごにんしきください (go-ninshiki kudasai)", "meaning": "please be aware/please note — polite request to acknowledge or take note of something", "example_jp": "リードタイムについてご認識ください。", "example_furigana": "りーどたいむについてごにんしきください。", "example_en": "Please be aware of the lead time.", "count": 1}, {"word": "失礼いたします", "reading": "しつれいいたします (shitsurei itashimasu)", "meaning": "excuse me — formal keigo phrase used when entering/leaving, interrupting, or ending a call", "example_jp": "お先に失礼いたします。", "example_furigana": "おさきにしつれいいたします。", "example_en": "Please excuse me for leaving first.", "count": 1}, {"word": "下流", "reading": "かりゅう (karyū)", "meaning": "downstream — the later phases of a project such as development and testing", "example_jp": "下流の設計開発フェーズも担当しました。", "example_furigana": "かりゅうのせっけいかいはつフェーズもたんとうしました。", "example_en": "I was also in charge of the downstream design and development phase.", "count": 1}, {"word": "参画", "reading": "さんかく (sankaku)", "meaning": "participation/joining — formally joining or being part of a project or organization", "example_jp": "このプロジェクトに参画したのは昨年です。", "example_furigana": "このプロジェクトにさんかくしたのはさくねんです。", "example_en": "I joined this project last year.", "count": 1}, {"word": "経歴", "reading": "けいれき (keireki)", "meaning": "career history/background — professional background and work experience", "example_jp": "簡単に私の経歴をご紹介します。", "example_furigana": "かんたんにわたしのけいれきをごしょうかいします。", "example_en": "Let me briefly introduce my professional background.", "count": 1}, {"word": "お恥ずかしながら", "reading": "おはずかしながら (o-hazukashi nagara)", "meaning": "I'm embarrassed to say / I'm ashamed to admit — humble keigo preface before admitting a weakness", "example_jp": "自分の弱点を謙虚に伝える場面 (humbly admitting a shortcoming)", "example_furigana": "お恥ずかしながら、英語はあまり得意ではありません。", "example_en": "I'm embarrassed to say that I'm not very good at English.", "count": 1}, {"word": "完遂", "reading": "かんすい (kansui)", "meaning": "Accomplishment / Full completion — finishing something thoroughly to the very end", "example_jp": "プロジェクトの完遂に向けて全力で取り組みます。", "example_furigana": "プロジェクトの完遂(かんすい)に向(む)けて全力(ぜんりょく)で取(と)り組(く)みます。", "example_en": "We will put in our full effort toward completing the project.", "count": 1}, {"word": "精査", "reading": "せいさ (seisa)", "meaning": "Thorough examination / Scrutiny — a careful and detailed review or investigation", "example_jp": "要件の内容を精査した上で計画を立てます。", "example_furigana": "要件(ようけん)の内容(ないよう)を精査(せいさ)した上(うえ)で計画(けいかく)を立(た)てます。", "example_en": "We will make a plan after thoroughly examining the requirements.", "count": 1}, {"word": "横断", "reading": "おうだん (oudan)", "meaning": "Cross-functional / Cross-organizational — spanning across multiple departments or units", "example_jp": "組織横断的な目標を設定して取り組んでいます。", "example_furigana": "組織(そしき)横断(おうだん)的(てき)な目標(もくひょう)を設定(せってい)して取(と)り組(く)んでいます。", "example_en": "We are working with cross-organizational goals in place.", "count": 1}, {"word": "悲願", "reading": "ひがん (higan)", "meaning": "Long-cherished wish / Aspiration — a deeply held goal sought for a long time", "example_jp": "このプロジェクトの完成はグループの悲願です。", "example_furigana": "このプロジェクトの完成(かんせい)はグループの悲願(ひがん)です。", "example_en": "The completion of this project is the group's long-cherished aspiration.", "count": 1}, {"word": "主体的", "reading": "しゅたいてき (shutaiteki)", "meaning": "Proactive / Taking initiative — acting independently with ownership and autonomy", "example_jp": "全メンバーが主体的にプロジェクトに関わることが大切です。", "example_furigana": "全(ぜん)メンバーが主体的(しゅたいてき)にプロジェクトに関(かか)わることが大切(たいせつ)です。", "example_en": "It is important for all members to be involved in the project proactively.", "count": 1}, {"word": "検証", "reading": "けんしょう (kenshou)", "meaning": "Verification / Validation — confirming something is correct or meets requirements", "example_jp": "テスト期間中に権限の設定を検証します。", "example_furigana": "テスト期間(きかん)中(ちゅう)に権限(けんげん)の設定(せってい)を検証(けんしょう)します。", "example_en": "We will verify the authority settings during the test period.", "count": 1}, {"word": "是正", "reading": "ぜせい (zesei)", "meaning": "Correction / Rectification — fixing an error or defect to restore proper condition", "example_jp": "テストで検出された不具合は是正して本番に備えます。", "example_furigana": "テストで検出(けんしゅつ)された不具合(ふぐあい)は是正(ぜせい)して本番(ほんばん)に備(そな)えます。", "example_en": "We will correct the defects detected in testing and prepare for go-live.", "count": 1}, {"word": "施策", "reading": "しさく (shisaku)", "meaning": "Measure / Initiative — a specific action or policy implemented to achieve a goal", "example_jp": "第六期の戦略施策を全社で共有します。", "example_furigana": "第六期(だいろっき)の戦略施策(せんりゃくしさく)を全社(ぜんしゃ)で共有(きょうゆう)します。", "example_en": "We will share the strategic measures for the sixth term across the company.", "count": 1}, {"word": "現業", "reading": "げんぎょう (gengyou)", "meaning": "Current operations / Day-to-day work — regular business duties as opposed to project work", "example_jp": "現業とプロジェクトの両立は大変ですが、やりがいもあります。", "example_furigana": "現業(げんぎょう)とプロジェクトの両立(りょうりつ)は大変(たいへん)ですが、やりがいもあります。", "example_en": "Balancing day-to-day work and project work is tough, but also rewarding.", "count": 1}, {"word": "両立", "reading": "りょうりつ (ryouritsu)", "meaning": "Balancing two things / Compatibility — successfully managing two responsibilities at once", "example_jp": "現業とプロジェクトの両立に向けてサポートを強化します。", "example_furigana": "現業(げんぎょう)とプロジェクトの両立(りょうりつ)に向(む)けてサポートを強化(きょうか)します。", "example_en": "We will strengthen support toward balancing daily operations and project work.", "count": 1}, {"word": "受入準備", "reading": "うけいれじゅんび (ukeireyobi)", "meaning": "Acceptance readiness / Business readiness — preparation on the business side to receive the new system", "example_jp": "事業側の受入準備を体系的に推進することがOCMの役割です。", "example_furigana": "事業側(じぎょうがわ)の受入準備(うけいれじゅんび)を体系的(たいけいてき)に推進(すいしん)することがOCMの役割(やくわり)です。", "example_en": "Systematically driving business-side acceptance readiness is OCM's role.", "count": 1}, {"word": "横展開", "reading": "よこてんかい (yokotenkai)", "meaning": "Horizontal deployment / Roll across — applying results or learnings across multiple units", "example_jp": "成果とテクノロジーを横展開してデータ駆動型経営を実現します。", "example_furigana": "成果(せいか)とテクノロジーを横展開(よこてんかい)してデータ駆動型(くどうがた)経営(けいえい)を実現(じつげん)します。", "example_en": "We will realize data-driven management by deploying results and technology horizontally.", "count": 1}, {"word": "決定事項", "reading": "けっていじこう (kettei jikou)", "meaning": "Decisions / Resolved items — matters formally decided in a meeting", "example_jp": "本日の決定事項を全員に共有します。", "example_furigana": "本日(ほんじつ)の決定事項(けっていじこう)を全員(ぜんいん)に共有(きょうゆう)します。", "example_en": "We will share today's decisions with everyone.", "count": 1}], "katakana": [{"word": "スピルオーバー", "reading": "スピルオーバー (supiru ōbā)", "meaning": "Spillover — tasks/work carried over past the deadline", "example_jp": "今週はスピルオーバーが多い。", "example_furigana": "今週（こんしゅう）はスピルオーバーが多（おお）い。", "example_en": "There are many spillovers this week.", "count": 35}, {"word": "フォーラム", "reading": "フォーラム (fōramu)", "meaning": "Forum — a formal discussion/conference event", "example_jp": "来週リージョナルフォーラムがある。", "example_furigana": "来週（らいしゅう）リージョナルフォーラムがある。", "example_en": "There is a regional forum next week.", "count": 14}, {"word": "キックオフ", "reading": "キックオフ (kikkuofu)", "meaning": "Kickoff — the start meeting of a project or phase", "example_jp": "月曜日の朝10時にキックオフがある。", "example_furigana": "月曜日（げつようび）の朝（あさ）10時（じ）にキックオフがある。", "example_en": "There is a kickoff at 10 AM on Monday.", "count": 12}, {"word": "インタビュー", "reading": "インタビュー (intabyuu)", "meaning": "Interview — a structured Q&A session to gather information for assessment purposes", "example_jp": "本日のインタビューで詳細を確認します。", "example_furigana": "本日（ほんじつ）のインタビューで詳細（しょうさい）を確認（かくにん）します。", "example_en": "We will confirm the details in today's interview.", "count": 11}, {"word": "マイルストーン", "reading": "マイルストーン (mairustoon)", "meaning": "Milestone — a significant checkpoint or event in a project timeline", "example_jp": "プロジェクトの大きなマイルストーンを全員で確認しました。", "example_furigana": "プロジェクトの大(おお)きなマイルストーンを全員(ぜんいん)で確認(かくにん)しました。", "example_en": "Everyone confirmed the major milestones of the project.", "count": 11}, {"word": "リモート", "reading": "リモート (rimōto)", "meaning": "Remote — working or attending online", "example_jp": "基本リモートで参加する。", "example_furigana": "基本（きほん）リモートで参加（さんか）する。", "example_en": "Basically participate remotely.", "count": 9}, {"word": "セッション", "reading": "セッション (sesshon)", "meaning": "Session — a focused meeting or working block", "example_jp": "個別セッションを設けます。", "example_furigana": "個別（こべつ）セッションを設（もう）けます。", "example_en": "We will hold individual sessions.", "count": 9}, {"word": "クローズ", "reading": "クローズ (kurōzu)", "meaning": "Close — completing or finalizing a task/phase", "example_jp": "今週中にタスクをクローズする。", "example_furigana": "今週中（こんしゅうじゅう）にタスクをクローズする。", "example_en": "Close the task within this week.", "count": 8}, {"word": "リソース", "reading": "りそーす (risoоsu)", "meaning": "Resource — personnel, budget, or capacity allocated to a project or task", "example_jp": "プロジェクトのリソースが不足しているため、増員を検討しています。", "example_furigana": "プロジェクトのリソースが不足（ふそく）しているため、増員（ぞういん）を検討（けんとう）しています。", "example_en": "Since project resources are insufficient, we are considering adding staff.", "count": 8}, {"word": "フェーズ", "reading": "ふぇーず (fēzu)", "meaning": "phase — a stage or period in a project lifecycle", "example_jp": "テストフェーズは10月から始まります。", "example_furigana": "テストふぇーずは10がつからはじまります。", "example_en": "The test phase begins in October.", "count": 8}, {"word": "ガバナンス", "reading": "ガバナンス (gabanansu)", "meaning": "Governance — rules and structures for managing a project/organization", "example_jp": "グローバルガバナンスの話をする。", "example_furigana": "グローバルガバナンスの話（はなし）をする。", "example_en": "Discuss global governance.", "count": 6}, {"word": "ステータスミーティング", "reading": "ステータスミーティング (sutētasu mītingu)", "meaning": "Status meeting — a regular meeting to review progress", "example_jp": "ステータスミーティングで進捗を報告する。", "example_furigana": "ステータスミーティングで進捗（しんちょく）を報告（ほうこく）する。", "example_en": "We report progress at the status meeting.", "count": 5}, {"word": "サインオフ", "reading": "サインオフ (Sainofu)", "meaning": "Sign-off — formal approval or authorization on a document, deliverable, or design", "example_jp": "最終サインオフを今週中に完了させます。", "example_furigana": "最終（さいしゅう）サインオフを今週中（こんしゅうちゅう）に完了（かんりょう）させます。", "example_en": "We will complete the final sign-off within this week.", "count": 5}, {"word": "アーキテクチャ", "reading": "あーきてくちゃ (ākitekucha)", "meaning": "architecture — the overall technical design and structure of a system", "example_jp": "データ連携のアーキテクチャを設計します。", "example_furigana": "データれんけいのあーきてくちゃをせっけいします。", "example_en": "We will design the architecture for data linkage.", "count": 5}, {"word": "アジェンダ", "reading": "アジェンダ (ajenda)", "meaning": "Agenda — list of items to be discussed in a meeting", "example_jp": "PMアジェンダを事前に確認してください。", "example_furigana": "PMアジェンダを事前（じぜん）に確認（かくにん）してください。", "example_en": "Please check the PM agenda in advance.", "count": 4}, {"word": "フォーキャスト", "reading": "フォーキャスト (fōkyasuto)", "meaning": "Forecast — a prediction of future status or results", "example_jp": "フォーキャストでグリーンに更新する。", "example_furigana": "フォーキャストでグリーンに更新（こうしん）する。", "example_en": "Update it to green in the forecast.", "count": 4}, {"word": "オンサイト", "reading": "オンサイト (onsaito)", "meaning": "On-site — physically present at the location", "example_jp": "リードはオンサイトを想定している。", "example_furigana": "リードはオンサイトを想定（そうてい）している。", "example_en": "The lead is expected to be on-site.", "count": 4}, {"word": "データマイグレーション", "reading": "データマイグレーション (dēta maigrēshon)", "meaning": "Data migration — transferring data between systems", "example_jp": "データマイグレーションのリプランを説明する。", "example_furigana": "データマイグレーションのリプランを説明（せつめい）する。", "example_en": "Explain the data migration replan.", "count": 4}, {"word": "ロールアウト", "reading": "ロールアウト (rōruauto)", "meaning": "Rollout — deployment/launch of a system to users", "example_jp": "日本ロールアウトを進める。", "example_furigana": "日本（にほん）ロールアウトを進（すす）める。", "example_en": "Advance the Japan rollout.", "count": 4}, {"word": "ゴーライブ", "reading": "ごーらいぶ (goo raibu)", "meaning": "Go-live — the point at which a system or product is launched and made available for actual use", "example_jp": "ゴーライブに向けてテストを急ピッチで進めています。", "example_furigana": "ゴーライブに向（む）けてテストを急（きゅう）ピッチで進（すす）めています。", "example_en": "We are rapidly advancing testing in preparation for the go-live.", "count": 4}, {"word": "リカバリー", "reading": "（rikabaríi）", "meaning": "recovery — a plan or action to get back on track after a delay or issue", "example_jp": "リカバリープランが不明瞭な状態です。", "example_furigana": "リカバリー（リカバリー）プラン（プラン）が（が）ふめいりょう（不明瞭）な（な）じょうたい（状態）です（です）。", "example_en": "The recovery plan is in an unclear state.", "count": 4}, {"word": "リプラン", "reading": "リプラン (ripuran)", "meaning": "Replan — revising an existing plan due to changes", "example_jp": "スケジュールのリプランが必要だ。", "example_furigana": "スケジュールのリプランが必要（ひつよう）だ。", "example_en": "A replan of the schedule is necessary.", "count": 3}, {"word": "アセスメント", "reading": "アセスメント (asesumento)", "meaning": "Assessment — an evaluation service to identify risks and improvement points", "example_jp": "アセスメントサービスのリードを担当しています。", "example_furigana": "アセスメントサービスのリードを担当（たんとう）しています。", "example_en": "I am in charge of leading the assessment service.", "count": 3}, {"word": "ボトムアップ", "reading": "ぼとむあっぷ (botommu appu)", "meaning": "Bottom-up — an approach where planning or estimation starts from the individual task level and aggregates upward", "example_jp": "今回はボトムアップで工数を積み上げて計画を立てました。", "example_furigana": "今回（こんかい）はボトムアップで工数（こうすう）を積（つ）み上（あ）げて計画（けいかく）を立（た）てました。", "example_en": "This time we built the plan using a bottom-up approach to aggregate man-hours.", "count": 3}, {"word": "リードタイム", "reading": "りーどたいむ (riido taimu)", "meaning": "Lead time — the time between initiating and completing a process or delivering a result", "example_jp": "調達のリードタイムを考慮してスケジュールを組む必要があります。", "example_furigana": "調達（ちょうたつ）のリードタイムを考慮（こうりょ）してスケジュールを組（く）む必要（ひつよう）があります。", "example_en": "We need to build the schedule taking into account procurement lead times.", "count": 3}, {"word": "ワークアラウンド", "reading": "わーくあらうんど (waaku araundo)", "meaning": "Workaround — a temporary solution or bypass used when a standard process cannot be followed", "example_jp": "本番稼働までの間はワークアラウンドで対応します。", "example_furigana": "本番稼働（ほんばんかどう）までの間（あいだ）はワークアラウンドで対応（たいおう）します。", "example_en": "We will handle it with a workaround until the system goes live.", "count": 3}, {"word": "グルーピング", "reading": "グルーピング (Gurūpingu)", "meaning": "Grouping — combining related items (e.g. FDS documents) into a single bundle for efficiency", "example_jp": "同様の要件はグルーピングしてURLを一つにできます。", "example_furigana": "同様（どうよう）の要件（ようけん）はグルーピングしてURLを一（ひと）つにできます。", "example_en": "Requirements with similar content can be grouped under one URL.", "count": 3}, {"word": "トレーサビリティ", "reading": "トレーサビリティ (toreesabiritei)", "meaning": "Traceability — the ability to track and link requirements to deliverables end-to-end", "example_jp": "URSはトレーサビリティを確保するための管理表です。", "example_furigana": "URSはトレーサビリティを確保(かくほ)するための管理表(かんりひょう)です。", "example_en": "The URS is a management table to ensure traceability.", "count": 3}, {"word": "ラップアップ", "reading": "ラップアップ (rappuappu)", "meaning": "Wrap-up — final summary meeting or session concluding a project phase", "example_jp": "ラップアップ報告会は来週木曜日です。", "example_furigana": "ラップアップ報告会（ほうこくかい）は来週（らいしゅう）木曜日（もくようび）です。", "example_en": "The wrap-up debriefing is next Thursday.", "count": 2}, {"word": "スポット", "reading": "すぽっと (supotto)", "meaning": "Spot (support) — short-term or ad-hoc support/staffing brought in for a specific period or task", "example_jp": "繁忙期にはスポットで外部リソースを活用する予定です。", "example_furigana": "繁忙期（はんぼうき）にはスポットで外部（がいぶ）リソースを活用（かつよう）する予定（よてい）です。", "example_en": "We plan to use external resources on a spot basis during the busy season.", "count": 2}, {"word": "ビジネスレビュー", "reading": "びじねすれびゅー (bijinesu rebyuu)", "meaning": "Business review — a structured meeting or assessment to evaluate business progress and results", "example_jp": "月次のビジネスレビューで進捗を確認しています。", "example_furigana": "月次（げつじ）のビジネスレビューで進捗（しんちょく）を確認（かくにん）しています。", "example_en": "We check progress in the monthly business review.", "count": 2}, {"word": "リスクアセス", "reading": "リスクアセス (Risuku asesu)", "meaning": "Risk assessment — the evaluation of risks associated with a process, system, or deliverable", "example_jp": "各ワークグループのリスクアセスを実施する予定です。", "example_furigana": "各（かく）ワークグループのリスクアセスを実施（じっし）する予定（よてい）です。", "example_en": "We plan to conduct risk assessments for each workgroup.", "count": 2}, {"word": "エンハンスメント", "reading": "エンハンスメント (Enhansumento)", "meaning": "Enhancement — an improvement or addition to an existing function or system", "example_jp": "このエンハンスメントには新しいURSが必要です。", "example_furigana": "このエンハンスメントには新（あたら）しいURSが必要（ひつよう）です。", "example_en": "This enhancement requires a new URS.", "count": 2}, {"word": "コンバージョン", "reading": "コンバージョン (Konbājon)", "meaning": "Conversion — data or process conversion, typically migrating data from one format or system to another", "example_jp": "コンバージョンのFDSは一つのURLにまとめることができます。", "example_furigana": "コンバージョンのFDSは一（ひと）つのURLにまとめることができます。", "example_en": "Conversion FDS documents can be consolidated under one URL.", "count": 2}, {"word": "ワークフロー", "reading": "ワークフロー (Wākufurō)", "meaning": "Workflow — an automated or defined sequence of steps or approvals in a business process", "example_jp": "ワークフローの変更には承認が必要です。", "example_furigana": "ワークフローの変更（へんこう）には承認（しょうにん）が必要（ひつよう）です。", "example_en": "Changes to workflows require approval.", "count": 2}, {"word": "アサイン", "reading": "（asain）", "meaning": "assign / assignment — assigning a person to a role or project task", "example_jp": "まだ人がアサインされていない箇所があります。", "example_furigana": "まだ（まだ）ひと（人）が（が）アサイン（アサイン）されて（されて）いない（いない）かしょ（箇所）が（が）あります（あります）。", "example_en": "There are still positions where no one has been assigned.", "count": 2}, {"word": "キャッチアップ", "reading": "きゃっちあっぷ (kyacchiappu)", "meaning": "catch up — getting up to speed on knowledge or work you have missed", "example_jp": "新しい技術はキャッチアップして対応します。", "example_furigana": "あたらしいぎじゅつはきゃっちあっぷしてたいおうします。", "example_en": "I will catch up on new technologies and handle it.", "count": 2}, {"word": "リハーサル", "reading": "リハーサル (rihaasaru)", "meaning": "Rehearsal — a practice run of a key process such as data migration before go-live", "example_jp": "データ移行のリハーサルでツールの精度を確認します。", "example_furigana": "データ移行(いこう)のリハーサルでツールの精度(せいど)を確認(かくにん)します。", "example_en": "We will verify the accuracy of the tools during the data migration rehearsal.", "count": 2}, {"word": "ロジスティックス", "reading": "ロジスティックス (Rojisutikkusu)", "meaning": "Logistics — the practical operational arrangements for running a meeting or event (rooms, schedules, etc.)", "example_jp": "日本橋での開催に関するロジスティックスをご説明します。", "example_furigana": "日本橋（にほんばし）での開催（かいさい）に関（かん）するロジスティックスをご説明（せつめい）します。", "example_en": "I will explain the logistics for the event held in Nihonbashi.", "count": 1}, {"word": "アドホック", "reading": "アドホック (Adohokku)", "meaning": "Ad hoc — an impromptu or unplanned session/action organized for a specific immediate purpose", "example_jp": "人数を絞ってアドホックで決定したいと思います。", "example_furigana": "人数（にんずう）を絞（しぼ）ってアドホックで決定（けってい）したいと思（おも）います。", "example_en": "I would like to narrow down the number of people and decide in an ad hoc session.", "count": 1}, {"word": "オープントピック", "reading": "オープントピック (Ōpun topikku)", "meaning": "Open topic — an unresolved agenda item or discussion point that requires further action or decision", "example_jp": "こちらはまだオープントピックとして残っています。", "example_furigana": "こちらはまだオープントピックとして残（のこ）っています。", "example_en": "This still remains as an open topic.", "count": 1}, {"word": "クロスセッション", "reading": "クロスセッション (Kurosu seshon)", "meaning": "Cross-session — a joint meeting or working session involving two or more teams to align or resolve issues", "example_jp": "FPとPRのクロスセッションを今週設けることにしました。", "example_furigana": "FPとPRのクロスセッションを今週（こんしゅう）設（もう）けることにしました。", "example_en": "We decided to hold a cross-session between FP and PR this week.", "count": 1}, {"word": "リーチアウト", "reading": "リーチアウト (Rīchi auto)", "meaning": "Reach out — proactively contacting or approaching someone to initiate communication or collaboration", "example_jp": "今後各チームにリーチアウトして会話を進めます。", "example_furigana": "今後（こんご）各（かく）チームにリーチアウトして会話（かいわ）を進（すす）めます。", "example_en": "Going forward, we will reach out to each team to advance the conversation.", "count": 1}, {"word": "ケースバイケース", "reading": "けーすばいけーす (kēsu bai kēsu)", "meaning": "case by case — handled differently depending on the situation", "example_jp": "それはケースバイケースで判断します。", "example_furigana": "それはけーすばいけーすでだんだんします。", "example_en": "We'll judge that on a case-by-case basis.", "count": 1}, {"word": "スコープ", "reading": "すこーぷ (sukōpu)", "meaning": "scope — the range of work or topics included in a project", "example_jp": "今回のスコープを確認してください。", "example_furigana": "こんかいのすこーぷをかくにんしてください。", "example_en": "Please check the scope for this time.", "count": 1}, {"word": "ハイパーケア", "reading": "はいぱーけあ (haipākea)", "meaning": "hypercare — the post-go-live intensive support period for a new system", "example_jp": "稼働後のハイパーケアはもう終わりましたか？", "example_furigana": "かどうごのはいぱーけあはもうおわりましたか？", "example_en": "Is the post-go-live hypercare period already over?", "count": 1}, {"word": "バリデーション", "reading": "バリデーション (barideshon)", "meaning": "Validation — confirming a system or document meets defined quality and compliance requirements", "example_jp": "バリデーション計画書に署名者のルールが定義されています。", "example_furigana": "バリデーション計画書(けいかくしょ)に署名者(しょめいしゃ)のルールが定義(ていぎ)されています。", "example_en": "The validation plan document defines the rules for signatories.", "count": 1}, {"word": "ステークホルダー", "reading": "ステークホルダー (suteekuhorudaa)", "meaning": "Stakeholder — a person or group with an interest in the outcome of a project", "example_jp": "ステークホルダー分析をもとにコミュニケーション計画を立てます。", "example_furigana": "ステークホルダー分析(ぶんせき)をもとにコミュニケーション計画(けいかく)を立(た)てます。", "example_en": "We will create a communication plan based on the stakeholder analysis.", "count": 1}, {"word": "コミットメント", "reading": "コミットメント (komittomento)", "meaning": "Commitment — a strong, dedicated pledge to achieve a goal or fulfill a responsibility", "example_jp": "プロジェクト成功には全員のコミットメントが必要です。", "example_furigana": "プロジェクト成功(せいこう)には全員(ぜんいん)のコミットメントが必要(ひつよう)です。", "example_en": "The success of the project requires the commitment of everyone.", "count": 1}], "phrases": [{"word": "ありがとうございます", "reading": "ありがとうございます (Arigatō gozaimasu)", "meaning": "Thank you very much — standard polite expression of gratitude used after presentations, reports, or requests", "usage_context": "発表後・依頼後・会議の区切り", "example_jp": "ご説明いただきありがとうございます。引き続きよろしくお願いします。", "example_en": "Thank you for the explanation. I look forward to your continued support.", "count": 49, "example_furigana": "ご説明（せつめい）いただきありがとうございます。引（ひ）き続（つづ）きよろしくお願（ねが）いします。"}, {"word": "割愛させていただきます", "reading": "かつあいさせていただきます（katsuai sasete itadakimasu）", "meaning": "I will omit / skip this — polite way to say you are leaving out details to save time", "usage_context": "プレゼンや会議で詳細を省く場面", "example_jp": "詳細の説明は割愛させていただきます。", "example_en": "I will omit the detailed explanation.", "count": 11, "example_furigana": ""}, {"word": "よろしくお願いいたします", "reading": "よろしくおねがいいたします (Yoroshiku onegai itashimasu)", "meaning": "Best regards / I am counting on your cooperation — standard closing phrase", "usage_context": "メール・会議の締めくくり", "example_jp": "引き続きよろしくお願いいたします。", "example_en": "Please continue to support me / I look forward to working with you.", "count": 10, "example_furigana": "引（ひ）き続（つづ）きよろしくお願（ねが）いいたします。"}, {"word": "以上です", "reading": "いじょうです (Ijō desu)", "meaning": "That's all / That concludes my report — the standard closing phrase at the end of a status update or presentation", "usage_context": "報告・プレゼンの締めくくり", "example_jp": "今週のゴールについてご説明しました。以上です。", "example_en": "I have explained the goals for this week. That is all.", "count": 9, "example_furigana": "今週（こんしゅう）のゴールについてご説明（せつめい）しました。以上（いじょう）です。"}, {"word": "よろしくお願いします", "reading": "よろしくおねがいします（yoroshiku onegaishimasu）", "meaning": "Please / Thank you in advance — used when making a request or handing off a task", "usage_context": "依頼や引き継ぎの場面", "example_jp": "引き続きよろしくお願いします。", "example_en": "Thank you for your continued support.", "count": 9, "example_furigana": ""}, {"word": "前倒し", "reading": "まえだおし (maedaoshi)", "meaning": "Moving up the schedule / Bringing forward — starting or completing earlier than originally planned", "usage_context": "プロジェクトスケジュール調整", "example_jp": "UPTをSITタイミングで前倒しして開始します。", "example_en": "We will start UPT earlier, bringing it forward to the SIT timing.", "count": 6, "example_furigana": ""}, {"word": "引き続きお願いします", "reading": "ひきつづきおねがいします（hikitsuzuki onegaishimasu）", "meaning": "Please continue / Keep it up — used to encourage continuation of work or support", "usage_context": "タスクの継続依頼・引き継ぎの場面", "example_jp": "引き続きよろしくお願いします。", "example_en": "Please continue to take care of this.", "count": 5, "example_furigana": ""}, {"word": "承知いたしました", "reading": "しょうちいたしました (Shōchi itashimashita)", "meaning": "Understood / I will take care of it — formal acknowledgement", "usage_context": "上司・クライアントへの返答", "example_jp": "承知いたしました。早急に対応いたします。", "example_en": "Understood. I will address it promptly.", "count": 3, "example_furigana": "承知（しょうち）いたしました。早急（さっきゅう）に対応（たいおう）いたします。"}, {"word": "引き続きご協力よろしくお願いします", "reading": "ひきつづきごきょうりょくよろしくおねがいします (Hikitsuzuki go-kyōryoku yoroshiku onegai shimasu)", "meaning": "Please continue to cooperate / Your ongoing cooperation is greatly appreciated", "usage_context": "プロジェクト継続・フェーズ移行の依頼", "example_jp": "スピルオーバー解決に向けて、引き続きご協力よろしくお願いします。", "example_en": "Please continue to cooperate toward resolving the spillovers.", "count": 2, "example_furigana": "スピルオーバー解決（かいけつ）に向（む）けて、引（ひ）き続（つづ）きご協力（きょうりょく）よろしくお願（ねが）いします。"}, {"word": "簡単に説明させていただきます", "reading": "かんたんにせつめいさせていただきます (Kantan ni setsumei sasete itadakimasu)", "meaning": "Allow me to give a brief explanation — polite introduction before a short presentation or status update", "usage_context": "チーム報告・プレゼン冒頭の前置き", "example_jp": "ちょっと簡単に説明させていただきます。", "example_en": "Allow me to give a brief explanation.", "count": 2, "example_furigana": "ちょっと簡単（かんたん）に説明（せつめい）させていただきます。"}, {"word": "お時間ありがとうございました", "reading": "おじかんありがとうございました (O-jikan arigatō gozaimashita)", "meaning": "Thank you for your time — polite closing phrase used at the end of a meeting or session", "usage_context": "会議・説明会の締めくくり", "example_jp": "本日はお時間ありがとうございました。", "example_en": "Thank you for your time today.", "count": 2, "example_furigana": "本日（ほんじつ）はお時間（じかん）ありがとうございました。"}, {"word": "時間オーバーしています", "reading": "じかんオーバーしています (Jikan ōbā shite imasu)", "meaning": "We are over time / running late — acknowledging that a meeting has exceeded its scheduled duration", "usage_context": "会議が予定時間を超えた時の一言", "example_jp": "すみません、時間オーバーしていますが、もう少しよろしいでしょうか。", "example_en": "I apologize, we are over time — could we have just a little more?", "count": 2, "example_furigana": "すみません、時間（じかん）オーバーしていますが、もう少（すこ）しよろしいでしょうか。"}, {"word": "ご連絡いただければと思います", "reading": "ごれんらくいただければとおもいます（gorenraku itadakereba to omoimasu）", "meaning": "Please contact me / I would appreciate it if you could reach out — polite request for someone to get in touch", "usage_context": "メールや会議での依頼・引き継ぎの場面", "example_jp": "ご不明な点があればご連絡いただければと思います。", "example_en": "If you have any questions, please feel free to contact me.", "count": 2, "example_furigana": ""}, {"word": "ポイントに絞り説明できるようにお願いします", "reading": "ぽいんとにしぼりせつめいできるようにおねがいします (pointo ni shibo​ri setsumei dekiru yō ni onegaishimasu)", "meaning": "Please narrow it down to the key points and explain clearly — used when asking someone to be concise", "usage_context": "時間が短いので、ポイントに絞り説明できるようにお願いします。", "example_jp": "じかんがみじかいので、ぽいんとにしぼりせつめいできるようにおねがいします。", "example_en": "Since time is short, please narrow it down to the key points.", "count": 2, "example_furigana": ""}, {"word": "次のページをお願いします", "reading": "つ ing?", "count": 1, "example_furigana": "ちょっとお願（ねが）い事項（じこう）なんですが、確認（かくにん）していただけますか。"}, {"word": "さらっとおさらいをしようか程度です", "reading": "さらっとおさらいをしようかていどです (saratto o-sarai o shiyō ka teido desu)", "meaning": "just a quick recap — used to indicate a brief, light-touch review rather than a full explanation", "usage_context": "新しいメンバーがいるので、さらっとおさらいをしようか程度です。", "example_jp": "あたらしいメンバーがいるので、さらっとおさらいをしようかていどです。", "example_en": "Since there are new members, let's just do a quick recap.", "count": 1, "example_furigana": ""}, {"word": "お疲れ様です", "reading": "おつかれさまです (otsukare sama desu)", "meaning": "Thank you for your hard work — acknowledgment of effort, used as a greeting", "usage_context": "業務の挨拶・会議の開始・終了時", "example_jp": "お疲れ様です。本日もよろしくお願いします。", "example_en": "Thank you for your hard work. Please take care today as well.", "count": 1, "example_furigana": ""}, {"word": "ご確認いただければと思います", "reading": "ごかくにんいただければとおもいます (go-kakunin itadakereba to omoimasu)", "meaning": "I would appreciate it if you could confirm / review this — polite review request", "usage_context": "資料共有時・レビュー依頼", "example_jp": "添付資料をご確認いただければと思います。", "example_en": "I would appreciate it if you could check the attached document.", "count": 1, "example_furigana": ""}, {"word": "引き続きよろしくお願いいたします", "reading": "ひきつづきよろしくおねがいいたします (hikitsuzuki yoroshiku onegai itashimasu)", "meaning": "Please continue to support us — formal phrase asking for continued cooperation", "usage_context": "プロジェクト会議の締めくくり", "example_jp": "今後ともどうぞ引き続きよろしくお願いいたします。", "example_en": "Thank you for your continued cooperation going forward.", "count": 1, "example_furigana": ""}, {"word": "繰り返しになりますが", "reading": "くりかえしになりますが (kurikaeshi ni narimasu ga)", "meaning": "Although I am repeating myself — used to reiterate a point already mentioned", "usage_context": "会議中の念押し・確認", "example_jp": "繰り返しになりますが、期日は6月末です。", "example_en": "Although I am repeating myself, the deadline is the end of June.", "count": 1, "example_furigana": ""}, {"word": "データ駆動型経営", "reading": "データくどうがたけいえい (deeta kudougatakei ei)", "meaning": "Data-driven management — running business strategy and decisions based on data", "usage_context": "経営ビジョン・DXプロジェクトのスローガン", "example_jp": "データ駆動型経営を実現することがBXの最終目標です。", "example_en": "Realizing data-driven management is BX's ultimate goal.", "count": 1, "example_furigana": ""}, {"word": "変化点を押さえる", "reading": "へんかてんをおさえる (henka-ten wo osaeru)", "meaning": "Capture the key changes — identify and track what is changing in a process or system", "usage_context": "チェンジ管理・OCM活動", "example_jp": "必要な変化点を押さえながらコミュニケーションに落としていきます。", "example_en": "We will translate the key changes into communication while capturing them.", "count": 1, "example_furigana": ""}, {"word": "巻き込んで進める", "reading": "まきこんですすめる (makikonde susumeru)", "meaning": "Proceed with stakeholder involvement — advance a task by engaging relevant parties", "usage_context": "プロジェクト推進・利害関係者との連携", "example_jp": "関係部門を巻き込んで進めることが重要です。", "example_en": "It is important to proceed by involving the relevant departments.", "count": 1, "example_furigana": ""}, {"word": "平滑化", "reading": "へいかつか (heikatsu-ka)", "meaning": "Smoothing / Leveling — reducing variation or friction to make a transition smoother", "usage_context": "プロジェクト移行・テスト計画", "example_jp": "UPTを前倒し開始することでUATの立ち上がりを平滑化します。", "example_en": "Starting UPT early will smooth out the UAT launch.", "count": 1, "example_furigana": ""}]};

let currentTab = 'business';
let currentTier = 'all';

function tier(count){
  if(count >= 8) return 'red';
  if(count >= 4) return 'green';
  return 'grey';
}
function tierLabel(count){
  if(count >= 8) return '🔴 ' + count;
  if(count >= 4) return '🟢 ' + count;
  return '⚪ ' + count;
}

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderCurrent();
}

function setTier(t, el){
  currentTier = t;
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCurrent();
}

function renderCurrent(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = RAW[currentTab] || [];

  // tier filter
  if(currentTier !== 'all') rows = rows.filter(r => tier(r.count) === currentTier);

  // search filter
  if(q) rows = rows.filter(r => {
    const hay = [r.word, r.reading, r.meaning, r.example_jp, r.example_en, r.usage_context].join(' ').toLowerCase();
    return hay.includes(q);
  });

  document.getElementById('count-label').textContent = rows.length + ' entries';
  const grid = document.getElementById('grid');

  if(rows.length === 0){
    grid.innerHTML = '<div class="empty"><div class="icon">🔎</div><div>No entries match your filter</div></div>';
    return;
  }

  grid.innerHTML = rows.map((r,i) => {
    const t = tier(r.count);
    const isPhrase = currentTab === 'phrases';
    const col4label = isPhrase ? 'Usage Context' : 'Example (Japanese)';
    const col4val   = isPhrase ? (r.usage_context||'') : (r.example_jp||'');
    const col5label = 'Example (Japanese)';
    const col5val   = r.example_jp||'';
    const col6label = 'Example (with furigana)';
    const col6val   = r.example_furigana||'';

    return `<div class="card" id="card-${i}" onclick="toggleCard('card-${i}')">
  <div class="card-head">
    <div class="card-word">
      <span>${esc(r.word)}</span>
      <span class="freq-badge freq-${t}">${tierLabel(r.count)}</span>
    </div>
    <div class="card-reading">${esc(r.reading)}</div>
  </div>
  <div class="card-body">
    <div class="card-meaning">${esc(r.meaning)}</div>
    <div class="card-details">
      ${col4val ? `<div class="detail-row">
        <div class="detail-label">${col4label}</div>
        <div class="detail-jp">${esc(col4val)}</div>
      </div>` : ''}
      ${col5val && isPhrase ? `<div class="detail-row">
        <div class="detail-label">${col5label}</div>
        <div class="detail-jp">${esc(col5val)}</div>
      </div>` : ''}
      ${col6val ? `<div class="detail-row">
        <div class="detail-label">${col6label}</div>
        <div class="detail-furigana">${esc(col6val)}</div>
      </div>` : ''}
      ${r.example_en ? `<div class="detail-row">
        <div class="detail-label">English Translation</div>
        <div class="detail-en">${esc(r.example_en)}</div>
      </div>` : ''}
    </div>
  </div>
  <div class="expand-hint"><span class="expand-arrow">▼</span> tap for examples</div>
</div>`;
  }).join('');
}

function toggleCard(id){
  document.getElementById(id).classList.toggle('open');
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// update tab counts (total, not filtered)
function updateTabCounts(){
  ['business','katakana','phrases'].forEach(k=>{
    document.getElementById('tc-'+k).textContent = (RAW[k]||[]).length;
  });
}

// last updated
const now = new Date();
document.getElementById('last-updated').textContent =
  'Updated ' + now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
document.getElementById('footer').textContent =
  'Japanese Business Vocabulary · ' + (RAW.business.length + RAW.katakana.length + RAW.phrases.length) + ' entries · Last synced ' + now.toLocaleDateString();

updateTabCounts();
renderCurrent();
</script>
