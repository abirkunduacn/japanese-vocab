<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Japanese Business Vocabulary</title>
<style>
  :root{
    --red:#C00000; --green:#375623; --grey:#595959;
    --blue-light:#EBF3FB; --navy:#1F4E79; --accent:#2E75B6;
    --bg:#f4f7fb; --card:#fff; --border:#d0dce9;
    --radius:10px; --shadow:0 2px 8px rgba(0,0,0,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:#222;min-height:100vh}

  /* ── Header ── */
  header{background:var(--navy);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:1.35rem;font-weight:700;letter-spacing:.5px}
  header p{font-size:.82rem;opacity:.8;margin-top:2px}
  .badge{background:#fff2;border:1px solid #fff4;border-radius:20px;padding:3px 12px;font-size:.78rem;white-space:nowrap}

  /* ── Controls ── */
  .controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .search-wrap{position:relative;flex:1;min-width:180px}
  .search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;outline:none;transition:border .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.45;font-size:1rem}
  .tier-filter{display:flex;gap:6px;flex-wrap:wrap}
  .tier-btn{border:none;border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;cursor:pointer;opacity:.55;transition:opacity .15s,transform .1s}
  .tier-btn.active{opacity:1;transform:scale(1.05)}
  .tier-btn.all{background:#e8edf2;color:#333}
  .tier-btn.red{background:#fde9e9;color:var(--red)}
  .tier-btn.green{background:#e8f4e8;color:var(--green)}
  .tier-btn.grey{background:#eee;color:var(--grey)}
  .count-label{font-size:.78rem;color:#888;white-space:nowrap;align-self:center}

  /* ── Tabs ── */
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:#fff;padding:0 20px}
  .tab{padding:11px 20px;cursor:pointer;font-size:.88rem;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;white-space:nowrap}
  .tab.active{color:var(--navy);border-bottom-color:var(--navy)}
  .tab:hover:not(.active){color:var(--accent)}
  .tab-count{display:inline-block;background:#e8edf2;border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:5px;font-weight:700}

  /* ── Grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:20px}

  /* ── Card ── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s,transform .1s;cursor:pointer}
  .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.13);transform:translateY(-1px)}
  .card-head{padding:14px 16px 10px;border-bottom:1px solid #f0f4f9}
  .card-word{font-size:1.4rem;font-weight:800;color:#1a1a1a;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .freq-badge{font-size:.72rem;font-weight:700;border-radius:12px;padding:2px 9px;white-space:nowrap}
  .freq-red  {background:#fde9e9;color:var(--red);border:1px solid #f5b8b8}
  .freq-green{background:#e8f4e8;color:var(--green);border:1px solid #b6d9b6}
  .freq-grey {background:#eee;color:var(--grey);border:1px solid #ccc}
  .card-reading{font-size:.8rem;color:#667;margin-top:4px}
  .card-body{padding:10px 16px 14px}
  .card-meaning{font-size:.88rem;color:#333;line-height:1.5}
  .card-details{margin-top:10px;display:none;border-top:1px dashed #e0eaf4;padding-top:10px}
  .card.open .card-details{display:block}
  .detail-row{margin-top:7px}
  .detail-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:2px}
  .detail-jp{font-size:.88rem;color:#1a1a1a;line-height:1.6}
  .detail-furigana{font-size:.78rem;color:#556;margin-top:2px;line-height:1.6}
  .detail-en{font-size:.78rem;color:#555;font-style:italic;margin-top:2px}
  .expand-hint{font-size:.7rem;color:#aaa;text-align:right;padding:2px 16px 8px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
  .expand-arrow{transition:transform .2s}
  .card.open .expand-arrow{transform:rotate(180deg)}

  /* ── Empty state ── */
  .empty{text-align:center;padding:60px 20px;color:#aaa}
  .empty .icon{font-size:3rem;margin-bottom:10px}

  /* ── Footer ── */
  footer{text-align:center;padding:24px;font-size:.75rem;color:#aaa;border-top:1px solid var(--border);margin-top:20px}

  @media(max-width:500px){
    .tab{padding:10px 12px;font-size:.8rem}
    .grid{grid-template-columns:1fr;padding:12px}
    header h1{font-size:1.1rem}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🇯🇵 Japanese Business Vocabulary</h1>
    <p>Business Japanese for the workplace</p>
  </div>
  <span class="badge" id="last-updated"></span>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search word, meaning, reading…" oninput="renderCurrent()"/>
  </div>
  <div class="tier-filter">
    <button class="tier-btn all active" onclick="setTier('all',this)">All</button>
    <button class="tier-btn red"  onclick="setTier('red',this)">🔴 High (8+)</button>
    <button class="tier-btn green" onclick="setTier('green',this)">🟢 Mid (4–7)</button>
    <button class="tier-btn grey" onclick="setTier('grey',this)">⚪ Low (1–3)</button>
  </div>
  <span class="count-label" id="count-label"></span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('business',this)">
    業務単語 <span class="tab-count" id="tc-business">0</span>
  </div>
  <div class="tab" onclick="switchTab('katakana',this)">
    カタカナ <span class="tab-count" id="tc-katakana">0</span>
  </div>
  <div class="tab" onclick="switchTab('phrases',this)">
    フレーズ <span class="tab-count" id="tc-phrases">0</span>
  </div>
</div>

<div class="grid" id="grid"></div>
<footer id="footer"></footer>

<script>
const RAW = {"business": [{"word": "報告", "reading": "ほうこく (hōkoku)", "meaning": "Report/Reporting — presenting information formally", "example_jp": "毎週進捗を報告してください。", "example_furigana": "毎週（まいしゅう）進捗（しんちょく）を報告（ほうこく）してください。", "example_en": "Please report the progress every week.", "count": 30}, {"word": "確認", "reading": "かくにん (kakunin)", "meaning": "Confirmation/Check — verifying or making sure of something", "example_jp": "スケジュールを確認します。", "example_furigana": "スケジュールを確認（かくにん）します。", "example_en": "I will confirm the schedule.", "count": 18}, {"word": "成果物", "reading": "せいかぶつ (seikabutsu)", "meaning": "Deliverable — a tangible output or result produced from a project or task", "example_jp": "成果物はPowerPoint資料で提出します。", "example_furigana": "成果物（せいかぶつ）はPowerPoint資料（しりょう）で提出（ていしゅつ）します。", "example_en": "The deliverable will be submitted as a PowerPoint document.", "count": 14}, {"word": "承認", "reading": "しょうにん（shounin）", "meaning": "approval — formal sign-off or authorization", "example_jp": "この書類の承認をお願いします。", "example_furigana": "この（この）しょるい（書類）の（の）しょうにん（承認）を（を）おねがい（お願い）します（します）。", "example_en": "Please approve this document.", "count": 14}, {"word": "体制", "reading": "たいせい (taisei)", "meaning": "Structure/System/Setup — organizational arrangement", "example_jp": "新しい組織体制を決める。", "example_furigana": "新（あたら）しい組織（そしき）体制（たいせい）を決（き）める。", "example_en": "Decide the new organizational structure.", "count": 11}, {"word": "完了", "reading": "かんりょう (Kanryō)", "meaning": "Completion; finished — the state of having fully finished a task, phase, or deliverable", "example_jp": "タスクを今週中に完了させる予定です。", "example_furigana": "タスクを今週中（こんしゅうちゅう）に完了（かんりょう）させる予定（よてい）です。", "example_en": "We plan to complete the tasks within this week.", "count": 10}, {"word": "新規", "reading": "しんき (Shinki)", "meaning": "New; newly created or issued — describes something created from scratch rather than modified", "example_jp": "新規のURLを発行する必要があります。", "example_furigana": "新規（しんき）のURLを発行（はっこう）する必要（ひつよう）があります。", "example_en": "A new URL needs to be issued.", "count": 10}, {"word": "方針", "reading": "ほうしん (hōshin)", "meaning": "Policy/Direction — the guiding approach or strategy", "example_jp": "全体の方針を先に決める。", "example_furigana": "全体（ぜんたい）の方針（ほうしん）を先（さき）に決（き）める。", "example_en": "Decide the overall direction first.", "count": 8}, {"word": "連携", "reading": "れんけい (renkei)", "meaning": "Collaboration/Coordination — working together across teams", "example_jp": "グローバルと連携して進める。", "example_furigana": "グローバルと連携（れんけい）して進（すす）める。", "example_en": "Proceed in collaboration with the global team.", "count": 8}, {"word": "認識", "reading": "にんしき (ninshiki)", "meaning": "Understanding/Recognition — shared awareness or alignment", "example_jp": "チームで認識を合わせましょう。", "example_furigana": "チームで認識（にんしき）を合（あ）わせましょう。", "example_en": "Let's align our understanding as a team.", "count": 7}, {"word": "全体", "reading": "ぜんたい (zentai)", "meaning": "Overall/Whole — referring to the entire project or group", "example_jp": "全体として進捗を報告する。", "example_furigana": "全体（ぜんたい）として進捗（しんちょく）を報告（ほうこく）する。", "example_en": "Report the progress as a whole.", "count": 7}, {"word": "判断", "reading": "はんだん (handan)", "meaning": "Judgment/Decision — making a call on a situation", "example_jp": "この状況を判断する必要がある。", "example_furigana": "この状況（じょうきょう）を判断（はんだん）する必要（ひつよう）がある。", "example_en": "It is necessary to make a judgment on this situation.", "count": 7}, {"word": "工数", "reading": "こうすう (kousuu)", "meaning": "Man-hours / effort estimate — the amount of labor (in person-hours or person-days) required for a task", "example_jp": "この作業の工数は約10人日と見積もっています。", "example_furigana": "この作業（さぎょう）の工数（こうすう）は約（やく）10人日（にんにち）と見積（みつも）もっています。", "example_en": "We estimate this task requires approximately 10 person-days of effort.", "count": 7}, {"word": "調整", "reading": "ちょうせい (chōsei)", "meaning": "Adjustment/Coordination — tuning schedules, plans, or relationships", "example_jp": "日程を調整しています。", "example_furigana": "日程（にってい）を調整（ちょうせい）しています。", "example_en": "I am adjusting the schedule.", "count": 6}, {"word": "対応", "reading": "たいおう (taiō)", "meaning": "Response/Handling — dealing with an issue or request", "example_jp": "この問題に対応します。", "example_furigana": "この問題（もんだい）に対応（たいおう）します。", "example_en": "I will handle this issue.", "count": 6}, {"word": "個別", "reading": "こべつ (kobetsu)", "meaning": "Individual/Separate — one-on-one or team-specific", "example_jp": "個別に確認させてください。", "example_furigana": "個別（こべつ）に確認（かくにん）させてください。", "example_en": "Please let me check individually.", "count": 6}, {"word": "よろしくお願いいたします", "reading": "よろしくおねがいいたします (yoroshiku onegai itashimasu)", "meaning": "Thank you / Please — formal closing phrase used when making requests or starting/ending meetings", "example_jp": "引き続きよろしくお願いいたします。", "example_furigana": "引（ひ）き続（つづ）きよろしくお願（ねが）いいたします。", "example_en": "Thank you for your continued support.", "count": 6}, {"word": "依頼", "reading": "いらい (irai)", "meaning": "Request — formally asking someone to do something", "example_jp": "この後すぐ依頼させていただきます。", "example_furigana": "この後（あと）すぐ依頼（いらい）させていただきます。", "example_en": "I will make a request right after this.", "count": 6}, {"word": "先行", "reading": "せんこう (Senkō)", "meaning": "Advance; going first — starting or proceeding ahead of others or ahead of schedule", "example_jp": "先行して着手することで、スケジュールを守れます。", "example_furigana": "先行（せんこう）して着手（ちゃくしゅ）することで、スケジュールを守（まも）れます。", "example_en": "By getting started ahead of time, we can keep to the schedule.", "count": 6}, {"word": "見通し", "reading": "みとおし（mitooshi）", "meaning": "outlook / prospect — a forward-looking estimate or forecast", "example_jp": "クローズの見通しがまだ立っていません。", "example_furigana": "クローズ（クローズ）の（の）みとおし（見通し）が（が）まだ（まだ）たって（立って）いません（いません）。", "example_en": "The outlook for closure is still unclear.", "count": 6}, {"word": "現状", "reading": "げんじょう（genjou）", "meaning": "current state / status quo — the existing situation as it stands", "example_jp": "現状を維持したいという意見があります。", "example_furigana": "げんじょう（現状）を（を）いじ（維持）したい（したい）という（という）いけん（意見）が（が）あります（あります）。", "example_en": "There are opinions in favor of maintaining the status quo.", "count": 6}, {"word": "保管場所", "reading": "ほかんばしょ（hokanbasho）", "meaning": "storage location — a warehouse or inventory location in a logistics system", "example_jp": "工場の保管場所コードを統一する議論が進んでいます。", "example_furigana": "こうじょう（工場）の（の）ほかんばしょ（保管場所）コード（コード）を（を）とういつ（統一）する（する）ぎろん（議論）が（が）すすんで（進んで）います（います）。", "example_en": "Discussion is progressing on unifying the factory storage location codes.", "count": 6}, {"word": "進捗", "reading": "しんちょく (shinchoku)", "meaning": "Progress — the current state of advancement of work", "example_jp": "各チームの進捗を確認する。", "example_furigana": "各（かく）チームの進捗（しんちょく）を確認（かくにん）する。", "example_en": "Check the progress of each team.", "count": 5}, {"word": "資料", "reading": "しりょう (shiryō)", "meaning": "Documents/Materials — presentation slides or reference files", "example_jp": "最新の資料を共有してください。", "example_furigana": "最新（さいしん）の資料（しりょう）を共有（きょうゆう）してください。", "example_en": "Please share the latest documents.", "count": 5}, {"word": "更新", "reading": "こうしん (kōshin)", "meaning": "Update — refreshing or revising content or status", "example_jp": "ステータスを更新してください。", "example_furigana": "ステータスを更新（こうしん）してください。", "example_en": "Please update the status.", "count": 5}, {"word": "引き続き", "reading": "ひきつづき (hikitsuzuki)", "meaning": "Continuing / Going forward — used to indicate continuation of efforts or cooperation", "example_jp": "引き続きよろしくお願いいたします。", "example_furigana": "引（ひ）き続（つづ）きよろしくお願（ねが）いいたします。", "example_en": "Thank you for your continued support going forward.", "count": 5}, {"word": "遅延", "reading": "ちえん（chien）", "meaning": "delay — a setback or postponement in schedule", "example_jp": "タスクの遅延により、全体スケジュールに影響が出ています。", "example_furigana": "タスク（タスク）の（の）ちえん（遅延）により（により）、ぜんたい（全体）スケジュール（スケジュール）に（に）えいきょう（影響）が（が）でて（出て）います（います）。", "example_en": "The task delay is affecting the overall schedule.", "count": 5}, {"word": "洗い出し", "reading": "あらいだし（araidas hi）", "meaning": "identifying and listing — thoroughly surfacing all items, issues, or requirements", "example_jp": "対象のCSを洗い出す作業を進めています。", "example_furigana": "たいしょう（対象）の（の）シーエス（CS）を（を）あらいだす（洗い出す）さぎょう（作業）を（を）すすめて（進めて）います（います）。", "example_en": "We are proceeding with the work of identifying all target CS items.", "count": 5}, {"word": "日程", "reading": "にってい (nittei)", "meaning": "Schedule/Date — planned dates and timing", "example_jp": "日程を最終化してください。", "example_furigana": "日程（にってい）を最終化（さいしゅうか）してください。", "example_en": "Please finalize the schedule.", "count": 4}, {"word": "可視化", "reading": "かしか (kashika)", "meaning": "Visualization — making data or processes visible and understandable through charts or dashboards", "example_jp": "進捗状況を可視化することでチーム全体が状況を把握できます。", "example_furigana": "進捗状況（しんちょくじょうきょう）を可視化（かしか）することでチーム全体（ぜんたい）が状況（じょうきょう）を把握（はあく）できます。", "example_en": "By visualizing progress, the entire team can grasp the situation.", "count": 4}, {"word": "差分", "reading": "さぶん（sabun）", "meaning": "difference / delta — gap between two versions, plans, or data sets", "example_jp": "要件の差分を確認してください。", "example_furigana": "ようけん（要件）の（の）さぶん（差分）を（を）かくにん（確認）して（して）ください（ください）。", "example_en": "Please check the delta in the requirements.", "count": 4}, {"word": "設計書", "reading": "せっけいしょ (sekkei-sho)", "meaning": "design document — specification or blueprint document used in development", "example_jp": "凍結の前に設計書を作ります。", "example_furigana": "とうけつのまえにせっけいしょをつくります。", "example_en": "We will create the design document before the freeze.", "count": 4}, {"word": "対外的", "reading": "たいがいてき (taigaiteki)", "meaning": "external/outward-facing — relating to external parties or the outside world", "example_jp": "対外的には公式なプロセスではありません。", "example_furigana": "たいがいてきにはこうしきなプロセスではありません。", "example_en": "Externally, it is not an official process.", "count": 4}, {"word": "稼働", "reading": "かどう (kadō)", "meaning": "Go-live/Operation — when a system or project becomes operational", "example_jp": "システムの稼働を目指す。", "example_furigana": "システムの稼働（かどう）を目指（めざ）す。", "example_en": "Aim for system go-live.", "count": 3}, {"word": "議論", "reading": "ぎろん (giron)", "meaning": "Discussion/Debate — in-depth talking through of a topic", "example_jp": "この内容についてグローバルで議論する。", "example_furigana": "この内容（ないよう）についてグローバルで議論（ぎろん）する。", "example_en": "Discuss this content globally.", "count": 3}, {"word": "段取り", "reading": "だんどり (dandori)", "meaning": "Arrangement/Preparation — setting up the steps and order of work", "example_jp": "段取りを事前に確認する。", "example_furigana": "段取（だんど）りを事前（じぜん）に確認（かくにん）する。", "example_en": "Confirm the arrangements in advance.", "count": 3}, {"word": "共有", "reading": "きょうゆう (kyōyū)", "meaning": "Sharing — distributing information to team members", "example_jp": "資料を皆さんに共有します。", "example_furigana": "資料（しりょう）を皆（みな）さんに共有（きょうゆう）します。", "example_en": "I will share the documents with everyone.", "count": 3}, {"word": "取りまとめ", "reading": "とりまとめ (torimatome)", "meaning": "Coordinating / Compiling — organizing and managing overall project activities", "example_jp": "このサービスの取りまとめをしております。", "example_furigana": "このサービスの取（と）りまとめをしております。", "example_en": "I am coordinating/overseeing this service.", "count": 3}, {"word": "業務移行", "reading": "ぎょうむいこう (gyoumu ikou)", "meaning": "Business transition — the process of transferring business operations to a new system or team", "example_jp": "業務移行の計画を早めに立てる必要があります。", "example_furigana": "業務移行（ぎょうむいこう）の計画（けいかく）を早（はや）めに立（た）てる必要（ひつよう）があります。", "example_en": "We need to establish the business transition plan early.", "count": 3}, {"word": "決算早期化", "reading": "けっさんそうきか (kessan soukika)", "meaning": "Accelerated period-end closing — shortening the time required to complete financial closing processes", "example_jp": "決算早期化のためにシステムの自動化を推進しています。", "example_furigana": "決算早期化（けっさんそうきか）のためにシステムの自動化（じどうか）を推進（すいしん）しています。", "example_en": "We are promoting system automation to accelerate the financial closing process.", "count": 3}, {"word": "顧問", "reading": "こもん (Komon)", "meaning": "Advisor; consultant — an expert who provides guidance and recommendations to a project or organization", "example_jp": "顧問チームだけではできないことが多いので、ワーキンググループと連携して進めましょう。", "example_furigana": "顧問（こもん）チームだけではできないことが多（おお）いので、ワーキンググループと連携（れんけい）して進（すす）めましょう。", "example_en": "There are many things the advisory team alone cannot do, so let's proceed in collaboration with the working group.", "count": 3}, {"word": "発番", "reading": "はっばん (Habban)", "meaning": "Issuing a reference number — the act of officially assigning a new document number (URS, FDS, etc.)", "example_jp": "新しい機能には発番が必要です。", "example_furigana": "新（あたら）しい機能（きのう）には発番（はっばん）が必要（ひつよう）です。", "example_en": "A new reference number must be issued for new functions.", "count": 3}, {"word": "改修", "reading": "かいしゅう (Kaishū)", "meaning": "Modification; revision — updating or reworking an existing system, document, or feature", "example_jp": "既存の機能を日本向けに改修します。", "example_furigana": "既存（きぞん）の機能（きのう）を日本向（にほんむ）けに改修（かいしゅう）します。", "example_en": "We will modify the existing function for Japan.", "count": 3}, {"word": "割り当て", "reading": "わりあて (Wariate)", "meaning": "Assignment; allocation — assigning a number, resource, or task to a specific item or person", "example_jp": "既存のURL番号を新しいFDSに割り当てます。", "example_furigana": "既存（きぞん）のURL番号（ばんごう）を新（あたら）しいFDSに割（わ）り当（あ）てます。", "example_en": "We will assign the existing URL number to the new FDS.", "count": 3}, {"word": "調達", "reading": "ちょうたつ（chootatsu）", "meaning": "procurement — the process of obtaining goods or services", "example_jp": "調達部署と連携して要件を確認します。", "example_furigana": "ちょうたつ（調達）ぶしょ（部署）と（と）れんけい（連携）して（して）ようけん（要件）を（を）かくにん（確認）します（します）。", "example_en": "We will confirm the requirements by coordinating with the procurement department.", "count": 3}, {"word": "仕入先", "reading": "しいれさき（shiresaki）", "meaning": "supplier / vendor — a company that provides goods or services", "example_jp": "仕入先への支払いを遅らせないようにします。", "example_furigana": "しいれさき（仕入先）への（への）しはらい（支払い）を（を）おくらせない（遅らせない）ように（ように）します（します）。", "example_en": "We will ensure supplier payments are not delayed.", "count": 3}, {"word": "粒度", "reading": "りゅうど（ryuudo）", "meaning": "granularity — the level of detail or refinement in data or requirements", "example_jp": "要件の粒度を細かく定義する必要があります。", "example_furigana": "ようけん（要件）の（の）りゅうど（粒度）を（を）こまかく（細かく）ていぎ（定義）する（する）ひつよう（必要）が（が）あります（あります）。", "example_en": "We need to define the granularity of requirements in detail.", "count": 3}, {"word": "着地", "reading": "ちゃくち（chakuchi）", "meaning": "landing / conclusion — reaching a final decision or outcome", "example_jp": "方針の着地が4月末になる予定です。", "example_furigana": "ほうしん（方針）の（の）ちゃくち（着地）が（が）しがつ（4月）まつ（末）に（に）なる（なる）よてい（予定）です（です）。", "example_en": "The landing on the policy direction is planned for end of April.", "count": 3}, {"word": "合意形成", "reading": "ごういけいせい（gouikeisei）", "meaning": "consensus building — the process of gaining agreement among stakeholders", "example_jp": "合意形成のもとでスピルオーバーを管理する。", "example_furigana": "ごうい（合意）けいせい（形成）の（の）もと（もと）で（で）スピルオーバー（スピルオーバー）を（を）かんり（管理）する（する）。", "example_en": "Spillover items are managed based on consensus building.", "count": 3}, {"word": "了解しました", "reading": "りょうかいしました（ryoukai shimashita）", "meaning": "Understood / Got it — standard acknowledgment in meetings, slightly less formal than 承知いたしました", "example_jp": "確認や指示を受けた時の返答", "example_furigana": "了解しました。確認して対応します。", "example_en": "Understood. I will check and take action.", "count": 3}, {"word": "凍結", "reading": "とうけつ (tōketsu)", "meaning": "freeze — stopping or locking something (e.g. license freeze, feature freeze)", "example_jp": "ライセンスの使用凍結になります。", "example_furigana": "ライセンスのしようとうけつになります。", "example_en": "The use of licenses will be frozen.", "count": 3}, {"word": "原則", "reading": "げんそく (gensoku)", "meaning": "principle/rule — a fundamental rule or policy that governs behavior", "example_jp": "原則として、設計書が完成してから開発を始めます。", "example_furigana": "げんそくとして、せっけいしょがかんせいしてからかいはつをはじめます。", "example_en": "As a rule, development starts after the design document is complete.", "count": 3}, {"word": "受け入れ", "reading": "うけいれ (ukere)", "meaning": "acceptance — receiving or accepting; also used for User Acceptance Testing (UAT) in IT", "example_jp": "受け入れテストを実施します。", "example_furigana": "うけいれテストをじっしします。", "example_en": "We will conduct acceptance testing.", "count": 3}, {"word": "見える化", "reading": "みえるか (mieru ka)", "meaning": "Visualization — making progress/tasks transparent and visible", "example_jp": "タスクの見える化をお願いします。", "example_furigana": "タスクの見（み）える化（か）をお願（ねが）いします。", "example_en": "Please make the tasks visible/transparent.", "count": 2}, {"word": "承知いたしました", "reading": "しょうちいたしました (shouchi itashimashita)", "meaning": "I understand / Understood — formal acknowledgment of instructions or information", "example_jp": "承知いたしました。すぐに対応します。", "example_furigana": "承知（しょうち）いたしました。すぐに対応（たいおう）します。", "example_en": "Understood. I will respond immediately.", "count": 2}, {"word": "本稼働", "reading": "ほんかどう (hon-kadou)", "meaning": "Production launch / Go-live — the official start of full system operation", "example_jp": "本稼働に向けて準備を進めています。", "example_furigana": "本稼働（ほんかどう）に向（む）けて準備（じゅんび）を進（すす）めています。", "example_en": "We are preparing toward the production launch.", "count": 2}, {"word": "推奨事項", "reading": "すいしょうじこう (suishou jikou)", "meaning": "Recommendations — suggested actions or best practices", "example_jp": "レポートに推奨事項を記載します。", "example_furigana": "レポートに推奨事項（すいしょうじこう）を記載（きさい）します。", "example_en": "We will include recommendations in the report.", "count": 2}, {"word": "報告会", "reading": "ほうこくかい (houkokukai)", "meaning": "Debriefing / Report meeting — a formal meeting to present findings and results", "example_jp": "来週の報告会で発見事項を共有します。", "example_furigana": "来週（らいしゅう）の報告会（ほうこくかい）で発見事項（はっけんじこう）を共有（きょうゆう）します。", "example_en": "We will share the findings at next week's debriefing.", "count": 2}, {"word": "権限設計", "reading": "けんげんせっけい (kengen sekkei)", "meaning": "Authorization design — the design of user access rights and permission structures", "example_jp": "フィオリの権限設計を見直す必要があります。", "example_furigana": "フィオリの権限設計（けんげんせっけい）を見直（みなお）す必要（ひつよう）があります。", "example_en": "We need to review the Fiori authorization design.", "count": 2}, {"word": "潜在的", "reading": "せんざいてき (senzaiteki)", "meaning": "Potential / Latent — describing hidden or underlying risks and challenges", "example_jp": "潜在的なリスクを洗い出します。", "example_furigana": "潜在的（せんざいてき）なリスクを洗（あら）い出（だ）します。", "example_en": "We will identify potential risks.", "count": 2}, {"word": "変化点対応", "reading": "へんかてんたいおう (henka ten taiou)", "meaning": "Change point response — addressing and managing identified points of change in a project", "example_jp": "変化点対応のリストを作成してチームで共有しました。", "example_furigana": "変化点対応（へんかてんたいおう）のリストを作成（さくせい）してチームで共有（きょうゆう）しました。", "example_en": "We created a list of change points and shared it with the team.", "count": 2}, {"word": "体制図", "reading": "たいせいず (taisei zu)", "meaning": "Organization chart / structure diagram — a diagram showing team roles and reporting relationships", "example_jp": "プロジェクトの体制図を作成して関係者に共有しました。", "example_furigana": "プロジェクトの体制図（たいせいず）を作成（さくせい）して関係者（かんけいしゃ）に共有（きょうゆう）しました。", "example_en": "We created the project organization chart and shared it with stakeholders.", "count": 2}, {"word": "増員", "reading": "ぞういん (zouin)", "meaning": "Staff increase / headcount expansion — adding more personnel to a team or project", "example_jp": "繁忙期に備えて増員を検討しています。", "example_furigana": "繁忙期（はんぼうき）に備（そな）えて増員（ぞういん）を検討（けんとう）しています。", "example_en": "We are considering increasing headcount in preparation for the busy season.", "count": 2}, {"word": "乖離", "reading": "かいり (Kairi)", "meaning": "Gap; discrepancy; divergence — the difference between a standard or target and the actual current state", "example_jp": "イグジットクライテリアに対して乖離があるところは黄色で示します。", "example_furigana": "イグジットクライテリアに対（たい）して乖離（かいり）があるところは黄色（きいろ）で示（しめ）します。", "example_en": "Areas with a gap against the exit criteria are shown in yellow.", "count": 2}, {"word": "周知", "reading": "しゅうち (Shūchi)", "meaning": "General awareness; notifying everyone — communicating information broadly to all relevant parties", "example_jp": "この内容を全体に周知させていただきます。", "example_furigana": "この内容（ないよう）を全体（ぜんたい）に周知（しゅうち）させていただきます。", "example_en": "We will inform everyone of this content.", "count": 2}, {"word": "予定通り", "reading": "よていどおり (Yotei dōri)", "meaning": "As planned; according to schedule — indicating that progress is on track with the original plan", "example_jp": "作業は予定通り3月末までに完了させます。", "example_furigana": "作業（さぎょう）は予定通（よていどお）り3月末（さんがつまつ）までに完了（かんりょう）させます。", "example_en": "The work will be completed by end of March as planned.", "count": 2}, {"word": "作法", "reading": "さほう (Sahō)", "meaning": "Proper procedure; established etiquette — the correct or expected way to perform a process", "example_jp": "作法通りに手続きを進めてください。", "example_furigana": "作法（さほう）通（どお）りに手続（てつづ）きを進（すす）めてください。", "example_en": "Please proceed with the procedure in the proper manner.", "count": 2}, {"word": "運用", "reading": "うんよう (Un'yō)", "meaning": "Operation; management — the ongoing use and management of a system or process in practice", "example_jp": "今後の運用を考えて設計してください。", "example_furigana": "今後（こんご）の運用（うんよう）を考（かんが）えて設計（せっけい）してください。", "example_en": "Please design it with future operations in mind.", "count": 2}, {"word": "発行", "reading": "はっこう (Hakkō)", "meaning": "Issuance; publication — the official release or issuance of a document, number, or certificate", "example_jp": "取り急ぎURSの発行を進めます。", "example_furigana": "取（と）り急（いそ）ぎURSの発行（はっこう）を進（すす）めます。", "example_en": "We will urgently proceed with the issuance of the URS.", "count": 2}, {"word": "背景", "reading": "はいけい (Haikei)", "meaning": "Background; context — the circumstances or history behind a situation or request", "example_jp": "質問の背景を教えていただけますでしょうか。", "example_furigana": "質問（しつもん）の背景（はいけい）を教（おし）えていただけますでしょうか。", "example_en": "Could you tell me the background behind the question?", "count": 2}, {"word": "着手", "reading": "ちゃくしゅ (Chakushu)", "meaning": "Starting; beginning work — commencing a task or project", "example_jp": "今週からこの作業に着手します。", "example_furigana": "今週（こんしゅう）からこの作業（さぎょう）に着手（ちゃくしゅ）します。", "example_en": "We will begin this work starting this week.", "count": 2}, {"word": "紐付け", "reading": "ひもづけ (Himodzuke)", "meaning": "Linking; association — connecting or tying two items (e.g. documents, IDs) together in a system", "example_jp": "FDSと既存のURSを紐付けてください。", "example_furigana": "FDSと既存（きぞん）のURSを紐付（ひもづ）けてください。", "example_en": "Please link the FDS to the existing URS.", "count": 2}, {"word": "見極め", "reading": "みきわめ（mikiwame）", "meaning": "determination / proper assessment — carefully judging the right course of action", "example_jp": "正確に見極めてからアプローチを取ります。", "example_furigana": "せいかくに（正確に）みきわめて（見極めて）から（から）アプローチ（アプローチ）を（を）とります（取ります）。", "example_en": "We will take an approach after making a careful assessment.", "count": 2}, {"word": "見直し", "reading": "みなおし (minaoshi)", "meaning": "review/reconsideration — looking at something again to revise or check", "example_jp": "ちょっと見直しさせてください。", "example_furigana": "ちょっとみなおしさせてください。", "example_en": "Let me review it for a moment.", "count": 2}, {"word": "差し替え", "reading": "さしかえ (sashikae)", "meaning": "replacement/substitution — swapping out a document, slide, or item with a new version", "example_jp": "この資料を差し替えてください。", "example_furigana": "このしりょうをさしかえてください。", "example_en": "Please replace this document.", "count": 2}, {"word": "確認事項", "reading": "かくにんじこう (kakunin jikō)", "meaning": "items to confirm — a checklist or list of points that need to be verified", "example_jp": "この場で確認事項はありますか？", "example_furigana": "このばでかくにんじこうはありますか？", "example_en": "Are there any items to confirm here?", "count": 2}, {"word": "工程", "reading": "こうてい (kōtei)", "meaning": "process/stage — a step or phase in a workflow or development lifecycle", "example_jp": "FUTは対外的には工程としてはないんです。", "example_furigana": "FUTはたいがいてきにはこうていとしてはないんです。", "example_en": "FUT does not exist as a formal process externally.", "count": 2}, {"word": "テスト実行者", "reading": "テストじっこうしゃ (tesuto jikkōsha)", "meaning": "test executor/tester — the person who performs or runs the test", "example_jp": "テスト実行者は開発メンバーです。", "example_furigana": "テストじっこうしゃはかいはつメンバーです。", "example_en": "The test executor is a development team member.", "count": 2}, {"word": "なるほど", "reading": "なるほど (naruhodo)", "meaning": "I see / I understand — natural response when something becomes clear", "example_jp": "なるほど、それが原因ですね。", "example_furigana": "なるほど、それが原因（げんいん）ですね。", "example_en": "I see, that's the cause, isn't it.", "count": 1}, {"word": "窓口", "reading": "まどぐち (madoguchi)", "meaning": "Point of contact / Liaison — the designated person or channel for communication", "example_jp": "担当の窓口は木暮さんです。", "example_furigana": "担当（たんとう）の窓口（まどぐち）は木暮（こぐれ）さんです。", "example_en": "The point of contact in charge is Mr. Kogure.", "count": 1}, {"word": "随時", "reading": "ずいじ (zuiji)", "meaning": "At any time / As needed — whenever necessary or on an ad-hoc basis", "example_jp": "随時ご質問をさせていただくことがあります。", "example_furigana": "随時（ずいじ）ご質問（しつもん）をさせていただくことがあります。", "example_en": "I may ask questions from time to time as needed.", "count": 1}, {"word": "差分要件", "reading": "さぶんようけん (sabun youken)", "meaning": "Differential requirements — unique or additional requirements specific to a region/scope", "example_jp": "日本固有の差分要件を確認します。", "example_furigana": "日本（にほん）固有（こゆう）の差分要件（さぶんようけん）を確認（かくにん）します。", "example_en": "We will confirm the Japan-specific differential requirements.", "count": 1}, {"word": "一気通貫", "reading": "いっきつうかん (ikki tsuukan)", "meaning": "End-to-end / Seamless — describes a consistent, unbroken process from start to finish", "example_jp": "一気通貫でサービスをサポートしています。", "example_furigana": "一気通貫（いっきつうかん）でサービスをサポートしています。", "example_en": "We are providing end-to-end service support.", "count": 1}, {"word": "収束", "reading": "しゅうそく (Shūsoku)", "meaning": "Convergence; resolution — bringing scattered issues or tasks to a conclusion or settled state", "example_jp": ers", "example_jp": "説明が終わり次第、質疑応答の時間を設けます。", "example_furigana": "説明（せつめい）が終（お）わり次第（しだい）、質疑応答（しつぎおうとう）の時間（じかん）を設（もう）けます。", "example_en": "Once the explanation is finished, we will have a Q&A session.", "count": 1}, {"word": "部屋割り", "reading": "へやわり (Heya-wari)", "meaning": "Room assignment; room allocation — the plan specifying which room or space each team or session uses", "example_jp": "事前に部屋割りをメールで展開しましたのでご確認ください。", "example_furigana": "事前（じぜん）に部屋割（へやわ）りをメールで展開（てんかい）しましたのでご確認（かくにん）ください。", "example_en": "We have shared the room assignments in advance by email, so please check them.", "count": 1}, {"word": "退室", "reading": "たいしつ (Taishitsu)", "meaning": "Leaving the room; exiting — the act of departing from a conference room or meeting space", "example_jp": "退室される際は、お忘れ物がないようにご注意ください。", "example_furigana": "退室（たいしつ）される際（さい）は、お忘（わす）れ物（もの）がないようにご注意（ちゅうい）ください。", "example_en": "When leaving the room, please make sure you have not left anything behind.", "count": 1}, {"word": "弊害", "reading": "へいがい (Heigai)", "meaning": "Drawback; harmful side effect — an unintended negative consequence of an approach or action", "example_jp": "一つずつ分けると弊害が生じる場合があります。", "example_furigana": "一（ひと）つずつ分（わ）けると弊害（へいがい）が生（しょう）じる場合（ばあい）があります。", "example_en": "Separating them one by one may cause drawbacks.", "count": 1}, {"word": "粛々と", "reading": "しゅくしゅくと (Shukushuku to)", "meaning": "Solemnly; quietly and dutifully — proceeding without fuss, following established rules faithfully", "example_jp": "ルールに従って粛々と進めます。", "example_furigana": "ルールに従（したが）って粛々（しゅくしゅく）と進（すす）めます。", "example_en": "We will proceed dutifully in accordance with the rules.", "count": 1}, {"word": "簡略化", "reading": "かんりゃくか (Kanryakuka)", "meaning": "Simplification; streamlining — reducing complexity in a process or document", "example_jp": "テスト手順を簡略化することを検討しています。", "example_furigana": "テスト手順（てじゅん）を簡略化（かんりゃくか）することを検討（けんとう）しています。", "example_en": "We are considering simplifying the test procedures.", "count": 1}, {"word": "補填",  are insufficient, we are considering adding staff.", "count": 8}, {"word": "ステータスミーティング", "reading": "ステータスミーティング (sutētasu mītingu)", "meaning": "Status meeting — a regular meeting to review progress", "example_jp": "ステータスミーティングで進捗を報告する。", "example_furigana": "ステータスミーティングで進捗（しんちょく）を報告（ほうこく）する。", "example_en": "We report progress at the status meeting.", "count": 5}, {"word": "サインオフ", "reading": "サインオフ (Sainofu)", "meaning": "Sign-off — formal approval or authorization on a document, deliverable, or design", "example_jp": "最終サインオフを今週中に完了させます。", "example_furigana": "最終（さいしゅう）サインオフを今週中（こんしゅうちゅう）に完了（かんりょう）させます。", "example_en": "We will complete the final sign-off within this week.", "count": 5}, {"word": "アジェンダ", "reading": "アジェンダ (ajenda)", "meaning": "Agenda — list of items to be discussed in a meeting", "example_jp": "PMアジェンダを事前に確認してください。", "example_furigana": "PMアジェンダを事前（じぜん）に確認（かくにん）してください。", "example_en": "Please check the PM agenda in advance.", "count": 4}, {"word": "フォーキャスト", "reading": "フォーキャスト (fōkyasuto)", "meaning": "Forecast — a prediction of future status or results", "example_jp": "フォーキャストでグリーンに更新する。", "example_furigana": "フォーキャストでグリーンに更新（こうしん）する。", "example_en": "Update it to green in the forecast.", "count": 4}, {"word": "オンサイト", "reading": "オンサイト (onsaito)", "meaning": "On-site — physically present at the location", "example_jp": "リードはオンサイトを想定している。", "example_furigana": "リードはオンサイトを想定（そうてい）している。", "example_en": "The lead is expected to be on-site.", "count": 4}, {"word": "データマイグレーション", "reading": "データマイグレーション (dēta maigrēshon)", "meaning": "Data migration — transferring data between systems", "example_jp": "データマイグレーションのリプランを説明する。", "example_furigana": "データマイグレーションのリプランを説明（せつめい）する。", "example_en": "Explain the data migration replan.", "count": 4}, {"word": "ゴーライブ", "reading": "ごーらいぶ (goo raibu)", "meaning": "Go-live — the point at which a system or product is launched and made available for actual use", "example_jp": "ゴーライブに向けてテストを急ピッチで進めています。", "exam let currentTab = 'business';
let currentTier = 'all';

function tier(count){
  if(count >= 8) return 'red';
  if(count >= 4) return 'green';
  return 'grey';
}
function tierLabel(count){
  if(count >= 8) return '🔴 ' + count;
  if(count >= 4) return '🟢 ' + count;
  return '⚪ ' + count;
}

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderCurrent();
}

function setTier(t, el){
  currentTier = t;
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCurrent();
}

function renderCurrent(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = RAW[currentTab] || [];

  // tier filter
  if(currentTier !== 'all') rows = rows.filter(r => tier(r.count) === currentTier);

  // search filter
  if(q) rows = rows.filter(r => {
    const hay = [r.word, r.reading, r.meaning, r.example_jp, r.example_en, r.usage_context].join(' ').toLowerCase();
    return hay.includes(q);
  });

  document.getElementById('count-label').textContent = rows.length + ' entries';
  const grid = document.getElementById('grid');

  if(rows.length === 0){
    grid.innerHTML = '<div class="empty"><div class="icon">🔎</div><div>No entries match your filter</div></div>';
    return;
  }

  grid.innerHTML = rows.map((r,i) => {
    const t = tier(r.count);
    const isPhrase = currentTab === 'phrases';
    const col4label = isPhrase ? 'Usage Context' : 'Example (Japanese)';
    const col4val   = isPhrase ? (r.usage_context||'') : (r.example_jp||'');
    const col5label = 'Example (Japanese)';
    const col5val   = r.example_jp||'';
    const col6label = 'Example (with furigana)';
    const col6val   = r.example_furigana||'';

    return `<div class="card" id="card-${i}" onclick="toggleCard('card-${i}')">
  <div class="card-head">
    <div class="card-word">
      <span>${esc(r.word)}</span>
      <span class="freq-badge freq-${t}">${tierLabel(r.count)}</span>
    </div>
    <div class="card-reading">${esc(r.reading)}</div>
  </div>
  <div class="card-body">
    <div class="card-meaning">${esc(r.meaning)}</div>
    <div class="card-details">
      ${col4val ? `<div class="detail-row">
        <div class="detail-label">${col4label}</div>
        <div class="detail-jp">${esc(col4val)}</div>
      </div>` : ''}
      ${col5val && isPhrase ? `<div class="detail-row">
        <div class="detail-label">${col5label}</div>
        <div class="detail-jp">${esc(col5val)}</div>
      </div>` : ''}
      ${col6val ? `<div class="detail-row">
        <div class="detail-label">${col6label}</div>
        <div class="detail-furigana">${esc(col6val)}</div>
      </div>` : ''}
      ${r.example_en ? `<div class="detail-row">
        <div class="detail-label">English Translation</div>
        <div class="detail-en">${esc(r.example_en)}</div>
      </div>` : ''}
    </div>
  </div>
  <div class="expand-hint"><span class="expand-arrow">▼</span> tap for examples</div>
</div>`;
  }).join('');
}

function toggleCard(id){
  document.getElementById(id).classList.toggle('open');
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// update tab counts (total, not filtered)
function updateTabCounts(){
  ['business','katakana','phrases'].forEach(k=>{
    document.getElementById('tc-'+k).textContent = (RAW[k]||[]).length;
  });
}

// last updated
const now = new Date();
document.getElementById('last-updated').textContent =
  'Updated ' + now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
document.getElementById('footer').textContent =
  'Japanese Business Vocabulary · ' + (RAW.business.length + RAW.katakana.length + RAW.phrases.length) + ' entries · Last synced ' + now.toLocaleDateString();

updateTabCounts();
renderCurrent();
</script>
